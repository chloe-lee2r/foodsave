<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>foodsavvi • manage ads</title>
    <link rel="icon" type="image/png" href="assets/icon.png">
    <link rel="shortcut icon" type="image/png" href="assets/icon.png">
    <!-- HTML5 QR Code Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        @font-face {
            font-family: 'RusticStory';
            src: url('./assets/RusticStory-R9vKM.ttf') format('truetype'),
                 url('./assets/RusticStory-1jDPL.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'RusticStory', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .app {
            width: 100%;
            max-width: 400px;
            background: white;
            min-height: 100vh;
        }
        
        .header {
            padding: 20px 16px;
            background: white;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .back-link {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #007aff;
            font-size: 20px;
        }
        
        .header h1 {
            flex: 1;
            font-size: 20px;
            font-weight: 600;
        }
        
        .content {
            padding: 16px;
            padding-bottom: 80px;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: #f8f9fa;
            padding: 4px;
            border-radius: 16px;
        }
        
        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            background: transparent;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .tab.active {
            background: white;
            color: #007aff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Barcode Scanner Section */
        .scanner-section {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            color: white;
        }
        
        .scanner-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        
        .scanner-header h3 {
            font-size: 16px;
        }
        
        .scan-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .scan-btn:active {
            background: rgba(255,255,255,0.3);
            transform: scale(0.98);
        }
        
        .scanner-container {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            display: none;
            margin-bottom: 12px;
        }
        
        .scanner-container.active {
            display: block;
        }
        
        #reader {
            width: 100%;
            min-height: 300px;
        }
        
        .stop-scan-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        
        .manual-entry-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            width: 100%;
        }
        
        /* Image Upload Section */
        .image-upload-section {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .image-preview {
            width: 120px;
            height: 120px;
            margin: 0 auto 12px;
            border-radius: 16px;
            background: #e8ecf0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .image-preview .placeholder {
            text-align: center;
            color: #999;
            font-size: 40px;
        }
        
        .upload-btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .upload-btn:active {
            background: #005bbf;
            transform: scale(0.98);
        }
        
        .remove-image-btn {
            background: #ff3b30;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 8px;
            display: inline-block;
        }
        
        .form-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #f0f0f0;
        }
        
        .form-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1a1a1a;
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        .input-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 6px;
            display: block;
            font-weight: 500;
        }
        
        .input-field {
            width: 100%;
            padding: 14px;
            border: 2px solid #f0f0f0;
            border-radius: 16px;
            font-size: 16px;
            background: #fafafa;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #007aff;
            background: white;
        }
        
        .input-field.filled-by-scanner {
            background: #e8f5e8;
            border-color: #34c759;
            animation: pulse 0.5s ease;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); background: #e8f5e8; }
            50% { transform: scale(1.02); background: #d4edda; }
            100% { transform: scale(1); background: #e8f5e8; }
        }
        
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #34c759;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .submit-btn:active {
            background: #2db14e;
            transform: scale(0.98);
        }
        
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        /* My Ads List */
        .my-ads-list {
            margin-top: 16px;
        }
        
        .my-ad-item {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .my-ad-image {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            overflow: hidden;
        }
        
        .my-ad-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .my-ad-details {
            flex: 1;
        }
        
        .my-ad-name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .my-ad-meta {
            font-size: 11px;
            color: #666;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        
        .my-ad-status {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
        }
        
        .status-active {
            background: #e8f5e8;
            color: #34c759;
        }
        
        .status-expired {
            background: #ffebee;
            color: #ff3b30;
        }
        
        .my-ad-actions {
            display: flex;
            gap: 8px;
        }
        
        .my-ad-actions button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }
        
        .edit-ad-btn {
            color: #007aff;
        }
        
        .delete-ad-btn {
            color: #ff3b30;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
            background: #f8f9fa;
            border-radius: 16px;
        }
        
        .add-link {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 16px;
            background: #007aff;
            color: white;
            text-decoration: none;
            border-radius: 20px;
        }
        
        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1a1a;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            transition: 0.3s;
            z-index: 1000;
            text-align: center;
            max-width: 90%;
        }
        
        .notification.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .notification.success {
            background: #34c759;
        }
        
        .notification.error {
            background: #ff3b30;
        }
        
        .notification.info {
            background: #007aff;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            display: none;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid white;
            border-top-color: #007aff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-top: 1px solid #f0f0f0;
            padding: 8px 20px;
            display: flex;
            justify-content: space-around;
        }
        
        .nav-item {
            text-decoration: none;
            color: #999;
            font-size: 12px;
            text-align: center;
            flex: 1;
        }
        
        .nav-item.active {
            color: #007aff;
        }
        
        .nav-emoji {
            font-size: 20px;
            margin-bottom: 2px;
            display: block;
        }
        
        .edit-mode-badge {
            background: #ff9500;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <a href="index.html" class="back-link">←</a>
            <h1 id="pageTitle">manage ads</h1>
        </div>
        
        <div class="content">
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('create')">📝 create ad</button>
                <button class="tab" onclick="switchTab('manage')">📋 manage ads</button>
            </div>
            
            <!-- CREATE AD TAB -->
            <div id="createTab" class="tab-content active">
                <!-- Barcode Scanner Section -->
                <div class="scanner-section">
                    <div class="scanner-header">
                        <span>📷</span>
                        <h3>Quick Add with Barcode</h3>
                    </div>
                    <button class="scan-btn" onclick="startScanner()">
                        📸 Scan Product Barcode
                    </button>
                    <div class="scanner-container" id="scannerContainer">
                        <div id="reader"></div>
                        <button class="stop-scan-btn" onclick="stopScanner()">❌ Stop Scanning</button>
                    </div>
                    <button class="manual-entry-btn" onclick="hideScanner()">
                        ✏️ Enter Manually Instead
                    </button>
                </div>
                
                <!-- Image Upload Section -->
                <div class="image-upload-section">
                    <div class="image-preview" id="imagePreview">
                        <div class="placeholder">📷</div>
                    </div>
                    <input type="file" id="imageUpload" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
                    <button class="upload-btn" onclick="document.getElementById('imageUpload').click()">
                        📸 Upload Product Image
                    </button>
                    <button class="remove-image-btn" onclick="removeImage()" style="display: none;" id="removeImageBtn">
                        🗑️ Remove Image
                    </button>
                </div>
                
                <!-- Form Card -->
                <div class="form-card">
                    <div class="form-title" id="formTitle">📝 New Deal Details</div>
                    <input type="hidden" id="editAdId" value="">
                    
                    <div class="input-group">
                        <label class="input-label">🍽️ Food Name *</label>
                        <input type="text" class="input-field" id="foodName" placeholder="e.g., Organic Milk">
                    </div>
                    
                    <div class="input-group">
                        <label class="input-label">🏷️ Brand / Description</label>
                        <input type="text" class="input-field" id="description" placeholder="Optional brand or description">
                    </div>
                    
                    <div class="row-2">
                        <div class="input-group">
                            <label class="input-label">💰 Original Price *</label>
                            <input type="number" class="input-field" id="originalPrice" placeholder="$0.00" step="0.01" min="0">
                        </div>
                        <div class="input-group">
                            <label class="input-label">🎉 Discount % *</label>
                            <input type="number" class="input-field" id="discount" placeholder="e.g., 20" step="1" min="0" max="100">
                        </div>
                    </div>
                    
                    <div class="row-2">
                        <div class="input-group">
                            <label class="input-label">📦 Quantity Available *</label>
                            <input type="number" class="input-field" id="quantity" placeholder="e.g., 50" min="1">
                        </div>
                        <div class="input-group">
                            <label class="input-label">🔢 Batch Number</label>
                            <input type="text" class="input-field" id="batchNumber" placeholder="Optional">
                        </div>
                    </div>
                    
                    <div class="row-2">
                        <div class="input-group">
                            <label class="input-label">📅 Offer End Date *</label>
                            <input type="date" class="input-field" id="offerEnds">
                        </div>
                        <div class="input-group">
                            <label class="input-label">⏰ Batch Expiry Date</label>
                            <input type="date" class="input-field" id="batchExpiry">
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label class="input-label">📂 Category</label>
                        <select class="input-field" id="category">
                            <option value="other">📌 Other</option>
                            <option value="dairy">🥛 Dairy</option>
                            <option value="produce">🥬 Produce</option>
                            <option value="meat">🥩 Meat</option>
                            <option value="bakery">🥖 Bakery</option>
                            <option value="pantry">📦 Pantry</option>
                            <option value="frozen">❄️ Frozen</option>
                        </select>
                    </div>
                    
                    <button class="submit-btn" id="submitBtn" onclick="submitAd()">📢 Post Deal</button>
                </div>
            </div>
            
            <!-- MANAGE ADS TAB -->
            <div id="manageTab" class="tab-content">
                <div class="section-title">
                    📢 my active deals
                    <button class="refresh-icon" onclick="loadMyAds()">↻</button>
                </div>
                <div class="my-ads-list" id="myAdsList">
                    <div class="empty-state">loading your ads...</div>
                </div>
                
                <div class="section-title" style="margin-top: 20px;">
                    📦 expired deals
                </div>
                <div class="my-ads-list" id="expiredAdsList">
                    <div class="empty-state">loading...</div>
                </div>
            </div>
        </div>
        
        <div class="bottom-nav">
            <a href="index.html" class="nav-item">
                <span class="nav-emoji">🏠</span>
                <span>home</span>
            </a>
            <a href="#" class="nav-item active">
                <span class="nav-emoji">📢</span>
                <span>ads</span>
            </a>
            <a href="business-profile.html?tab=orders" class="nav-item">
                <span class="nav-emoji">📦</span>
                <span>orders</span>
            </a>
            <a href="business-profile.html?tab=profile" class="nav-item">
                <span class="nav-emoji">⚙️</span>
                <span>settings</span>
            </a>
        </div>
    </div>
    
    <div class="notification" id="notification"></div>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>
    
    <script src="https://npmcdn.com/parse/dist/parse.min.js"></script>
    <script src="backend.js"></script>
    
    <script>
        let html5QrCode = null;
        let isScanning = false;
        let uploadedImageBase64 = null;
        let editMode = false;
        let editAdId = null;
        
        // Product database for barcode lookup
        const productDatabase = {
            "8901234567890": { name: "Amul Milk", price: 45, category: "dairy" },
            "8901234567891": { name: "Britannia Bread", price: 35, category: "bakery" },
            "8901234567892": { name: "Nestle Maggi", price: 12, category: "pantry" },
            "8901234567893": { name: "Dove Soap", price: 85, category: "other" },
            "8901234567894": { name: "Patanjali Atta", price: 220, category: "pantry" },
            "8901234567895": { name: "Amul Butter", price: 55, category: "dairy" },
            "8901234567896": { name: "Tata Salt", price: 25, category: "pantry" },
            "8901234567897": { name: "Coca Cola", price: 40, category: "other" },
            "8901234567898": { name: "Lays Chips", price: 20, category: "other" },
            "8901234567899": { name: "Kissan Jam", price: 95, category: "pantry" },
            "123456789012": { name: "Organic Milk", price: 60, category: "dairy" },
            "123456789013": { name: "Free Range Eggs", price: 90, category: "dairy" },
            "123456789014": { name: "Sourdough Bread", price: 45, category: "bakery" },
            "123456789015": { name: "Chicken Breast", price: 220, category: "meat" },
            "123456789016": { name: "Broccoli", price: 40, category: "produce" },
            "123456789017": { name: "Bananas", price: 30, category: "produce" },
            "123456789018": { name: "Greek Yogurt", price: 65, category: "dairy" },
            "123456789019": { name: "Frozen Pizza", price: 180, category: "frozen" }
        };
        
        // Set default dates
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            const nextWeek = new Date();
            nextWeek.setDate(today.getDate() + 7);
            const nextMonth = new Date();
            nextMonth.setDate(today.getDate() + 30);
            
            document.getElementById('offerEnds').value = nextWeek.toISOString().split('T')[0];
            document.getElementById('batchExpiry').value = nextMonth.toISOString().split('T')[0];
            document.getElementById('quantity').value = 50;
            
            // Check if editing from URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            const editId = urlParams.get('edit');
            if (editId) {
                editMode = true;
                editAdId = editId;
                document.getElementById('pageTitle').innerHTML = 'edit ad <span class="edit-mode-badge">✏️ editing</span>';
                document.getElementById('formTitle').innerHTML = '✏️ Edit Deal';
                document.getElementById('submitBtn').innerHTML = '💾 Save Changes';
                loadAdForEditing(editId);
            }
            
            loadMyAds();
        });
        
        async function loadAdForEditing(adId) {
            document.getElementById('loadingOverlay').style.display = 'flex';
            try {
                const shopAds = await Backend.getShopAds();
                const ad = shopAds.find(a => a.id === adId);
                if (ad) {
                    document.getElementById('foodName').value = ad.foodName;
                    document.getElementById('description').value = ad.description || '';
                    document.getElementById('originalPrice').value = ad.originalPrice;
                    document.getElementById('discount').value = ad.discount;
                    document.getElementById('quantity').value = ad.quantityLeft;
                    document.getElementById('batchNumber').value = ad.batchNumber || '';
                    document.getElementById('category').value = ad.category || 'other';
                    
                    const offerEnds = new Date(ad.offerEnds);
                    document.getElementById('offerEnds').value = offerEnds.toISOString().split('T')[0];
                    
                    if (ad.batchExpiryDate) {
                        const batchExpiry = new Date(ad.batchExpiryDate);
                        document.getElementById('batchExpiry').value = batchExpiry.toISOString().split('T')[0];
                    }
                    
                    if (ad.productImage) {
                        uploadedImageBase64 = ad.productImage;
                        const preview = document.getElementById('imagePreview');
                        preview.innerHTML = `<img src="${uploadedImageBase64}" alt="Product preview">`;
                        document.getElementById('removeImageBtn').style.display = 'inline-block';
                    }
                }
            } catch (error) {
                showNotification('Error loading ad for editing', 'error');
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }
        
        function switchTab(tab) {
            const createTab = document.getElementById('createTab');
            const manageTab = document.getElementById('manageTab');
            const tabs = document.querySelectorAll('.tab');
            
            tabs.forEach(t => t.classList.remove('active'));
            
            if (tab === 'create') {
                createTab.classList.add('active');
                manageTab.classList.remove('active');
                tabs[0].classList.add('active');
                document.getElementById('pageTitle').innerHTML = editMode ? 'edit ad' : 'create ad';
            } else {
                createTab.classList.remove('active');
                manageTab.classList.add('active');
                tabs[1].classList.add('active');
                document.getElementById('pageTitle').innerHTML = 'manage ads';
                loadMyAds();
            }
        }
        
        // Image upload handling
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (file.size > 5 * 1024 * 1024) {
                showNotification('Image too large. Max 5MB.', 'error');
                return;
            }
            
            if (!file.type.startsWith('image/')) {
                showNotification('Please select an image file.', 'error');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedImageBase64 = e.target.result;
                const preview = document.getElementById('imagePreview');
                preview.innerHTML = `<img src="${uploadedImageBase64}" alt="Product preview">`;
                document.getElementById('removeImageBtn').style.display = 'inline-block';
                showNotification('Image uploaded successfully!', 'success');
            };
            reader.readAsDataURL(file);
        }
        
        function removeImage() {
            uploadedImageBase64 = null;
            const preview = document.getElementById('imagePreview');
            preview.innerHTML = '<div class="placeholder">📷</div>';
            document.getElementById('removeImageBtn').style.display = 'none';
            document.getElementById('imageUpload').value = '';
            showNotification('Image removed', 'info');
        }
        
        // Barcode scanner functions
        async function startScanner() {
            const scannerContainer = document.getElementById('scannerContainer');
            scannerContainer.classList.add('active');
            
            if (html5QrCode === null) {
                html5QrCode = new Html5Qrcode("reader");
            }
            
            if (!isScanning) {
                try {
                    isScanning = true;
                    await html5QrCode.start(
                        { facingMode: "environment" },
                        {
                            fps: 10,
                            qrbox: { width: 250, height: 250 }
                        },
                        onScanSuccess,
                        onScanError
                    );
                    showNotification('Scanner started. Point camera at barcode.', 'info');
                } catch (err) {
                    console.error("Failed to start scanner:", err);
                    showNotification('Could not start camera. Please check permissions.', 'error');
                    isScanning = false;
                }
            }
        }
        
        async function stopScanner() {
            if (html5QrCode && isScanning) {
                try {
                    await html5QrCode.stop();
                    isScanning = false;
                    const scannerContainer = document.getElementById('scannerContainer');
                    scannerContainer.classList.remove('active');
                    showNotification('Scanner stopped', 'info');
                } catch (err) {
                    console.error("Failed to stop scanner:", err);
                }
            } else {
                const scannerContainer = document.getElementById('scannerContainer');
                scannerContainer.classList.remove('active');
            }
        }
        
        function hideScanner() {
            stopScanner();
        }
        
        async function onScanSuccess(decodedText, decodedResult) {
            console.log(`Scanned barcode: ${decodedText}`);
            stopScanner();
            
            const product = productDatabase[decodedText];
            
            if (product) {
                document.getElementById('foodName').value = product.name;
                document.getElementById('originalPrice').value = product.price;
                document.getElementById('category').value = product.category;
                
                document.getElementById('foodName').classList.add('filled-by-scanner');
                document.getElementById('originalPrice').classList.add('filled-by-scanner');
                
                setTimeout(() => {
                    document.getElementById('foodName').classList.remove('filled-by-scanner');
                    document.getElementById('originalPrice').classList.remove('filled-by-scanner');
                }, 1000);
                
                showNotification(`✅ Found: ${product.name} - $${product.price}`, 'success');
                await fetchProductInfo(decodedText);
            } else {
                showNotification(`⚠️ Product not found. Barcode: ${decodedText}. Please enter details manually.`, 'info');
                await fetchProductInfo(decodedText);
            }
        }
        
        async function fetchProductInfo(barcode) {
            try {
                const response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
                const data = await response.json();
                
                if (data.status === 1 && data.product) {
                    const product = data.product;
                    
                    if (product.product_name) {
                        document.getElementById('foodName').value = product.product_name;
                        document.getElementById('foodName').classList.add('filled-by-scanner');
                        setTimeout(() => document.getElementById('foodName').classList.remove('filled-by-scanner'), 1000);
                    }
                    
                    if (product.brands) {
                        const desc = document.getElementById('description');
                        if (desc.value) desc.value += ` | ${product.brands}`;
                        else desc.value = product.brands;
                        desc.classList.add('filled-by-scanner');
                        setTimeout(() => desc.classList.remove('filled-by-scanner'), 1000);
                    }
                    
                    if (product.categories) {
                        const categories = product.categories.toLowerCase();
                        const categoryMap = {
                            'dairy': ['milk', 'cheese', 'yogurt', 'butter', 'cream'],
                            'meat': ['meat', 'chicken', 'beef', 'pork', 'lamb', 'sausage'],
                            'produce': ['fruit', 'vegetable', 'salad', 'apple', 'banana', 'carrot'],
                            'bakery': ['bread', 'cake', 'cookie', 'pastry', 'bun', 'roll'],
                            'frozen': ['frozen', 'ice cream', 'freezer'],
                            'pantry': ['rice', 'pasta', 'cereal', 'bean', 'lentil', 'flour', 'sugar']
                        };
                        
                        for (const [cat, keywords] of Object.entries(categoryMap)) {
                            if (keywords.some(kw => categories.includes(kw))) {
                                document.getElementById('category').value = cat;
                                break;
                            }
                        }
                    }
                    
                    showNotification(`📦 Found product info from online database!`, 'success');
                    
                    if (product.image_url) {
                        fetchImageAsBase64(product.image_url);
                    }
                }
            } catch (error) {
                console.log('Online lookup failed:', error);
            }
        }
        
        async function fetchImageAsBase64(url) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const reader = new FileReader();
                reader.onloadend = function() {
                    uploadedImageBase64 = reader.result;
                    const preview = document.getElementById('imagePreview');
                    preview.innerHTML = `<img src="${uploadedImageBase64}" alt="Product preview">`;
                    document.getElementById('removeImageBtn').style.display = 'inline-block';
                };
                reader.readAsDataURL(blob);
            } catch (error) {
                console.log('Could not fetch product image:', error);
            }
        }
        
        function onScanError(errorMessage) {
            // Silently ignore
        }
        
        async function submitAd() {
            const foodName = document.getElementById('foodName').value.trim();
            const description = document.getElementById('description').value.trim();
            const originalPrice = parseFloat(document.getElementById('originalPrice').value);
            const discount = parseFloat(document.getElementById('discount').value);
            const quantity = parseInt(document.getElementById('quantity').value);
            const batchNumber = document.getElementById('batchNumber').value.trim();
            const offerEnds = document.getElementById('offerEnds').value;
            const batchExpiry = document.getElementById('batchExpiry').value;
            const category = document.getElementById('category').value;
            
            if (!foodName) {
                showNotification('Please enter food name', 'error');
                return;
            }
            
            if (isNaN(originalPrice) || originalPrice <= 0) {
                showNotification('Please enter a valid original price', 'error');
                return;
            }
            
            if (isNaN(discount) || discount < 0 || discount > 100) {
                showNotification('Please enter a valid discount (0-100)', 'error');
                return;
            }
            
            if (isNaN(quantity) || quantity < 1) {
                showNotification('Please enter quantity available', 'error');
                return;
            }
            
            if (!offerEnds) {
                showNotification('Please select offer end date', 'error');
                return;
            }
            
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            const adData = {
                foodName: foodName,
                description: description,
                originalPrice: originalPrice,
                discount: discount,
                quantityLeft: quantity,
                batchNumber: batchNumber,
                offerEnds: offerEnds,
                batchExpiryDate: batchExpiry || offerEnds,
                category: category,
                imageBase64: uploadedImageBase64
            };
            
            try {
                let result;
                if (editMode && editAdId) {
                    // Update existing ad
                    result = await Backend.updateAd(editAdId, adData);
                    if (result.success) {
                        showNotification('Deal updated successfully!', 'success');
                        setTimeout(() => {
                            window.location.href = 'advertise.html';
                        }, 1500);
                    } else {
                        showNotification(result.message || 'Failed to update deal', 'error');
                    }
                } else {
                    // Create new ad
                    result = await Backend.createAd(adData);
                    if (result.success) {
                        showNotification('Deal posted successfully!', 'success');
                        resetForm();
                        loadMyAds();
                    } else {
                        showNotification(result.message || 'Failed to post deal', 'error');
                    }
                }
            } catch (error) {
                console.error('Error posting ad:', error);
                showNotification('Error posting deal. Please try again.', 'error');
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }
        
        function resetForm() {
            document.getElementById('foodName').value = '';
            document.getElementById('description').value = '';
            document.getElementById('originalPrice').value = '';
            document.getElementById('discount').value = '';
            document.getElementById('quantity').value = '50';
            document.getElementById('batchNumber').value = '';
            document.getElementById('category').value = 'other';
            removeImage();
            
            const today = new Date();
            const nextWeek = new Date();
            nextWeek.setDate(today.getDate() + 7);
            const nextMonth = new Date();
            nextMonth.setDate(today.getDate() + 30);
            document.getElementById('offerEnds').value = nextWeek.toISOString().split('T')[0];
            document.getElementById('batchExpiry').value = nextMonth.toISOString().split('T')[0];
        }
        
        async function loadMyAds() {
            try {
                const currentUser = Backend.getCurrentUser();
                if (!currentUser) return;
                
                const shopAds = await Backend.getShopAds(currentUser.id);
                const now = new Date();
                const activeAds = shopAds.filter(ad => ad.active && new Date(ad.offerEnds) > now);
                const expiredAds = shopAds.filter(ad => !ad.active || new Date(ad.offerEnds) <= now);
                
                const activeContainer = document.getElementById('myAdsList');
                const expiredContainer = document.getElementById('expiredAdsList');
                
                if (activeAds.length === 0) {
                    activeContainer.innerHTML = `<div class="empty-state"><div>📢 no active ads</div><a href="#" onclick="switchTab('create'); return false;" class="add-link">create your first ad →</a></div>`;
                } else {
                    activeContainer.innerHTML = activeAds.map(ad => `
                        <div class="my-ad-item">
                            ${ad.productImage ? `<div class="my-ad-image"><img src="${ad.productImage}" alt="${escapeHtml(ad.foodName)}"></div>` : `<div class="my-ad-image">🏷️</div>`}
                            <div class="my-ad-details">
                                <div class="my-ad-name">${escapeHtml(ad.foodName)}</div>
                                <div class="my-ad-meta">
                                    <span>${ad.discount}% off</span>
                                    <span>📊 ${ad.quantityLeft || 0} left</span>
                                    <span>💰 $${ad.originalPrice}</span>
                                    <span class="my-ad-status status-active">active</span>
                                </div>
                            </div>
                            <div class="my-ad-actions">
                                <button class="edit-ad-btn" onclick="editAd('${ad.id}')">✏️</button>
                                <button class="delete-ad-btn" onclick="deleteAd('${ad.id}', '${escapeHtml(ad.foodName)}')">🗑️</button>
                            </div>
                        </div>
                    `).join('');
                }
                
                if (expiredAds.length === 0) {
                    expiredContainer.innerHTML = '<div class="empty-state">📭 no expired deals</div>';
                } else {
                    expiredContainer.innerHTML = expiredAds.map(ad => `
                        <div class="my-ad-item" style="opacity: 0.7;">
                            ${ad.productImage ? `<div class="my-ad-image"><img src="${ad.productImage}" alt="${escapeHtml(ad.foodName)}"></div>` : `<div class="my-ad-image">🏷️</div>`}
                            <div class="my-ad-details">
                                <div class="my-ad-name">${escapeHtml(ad.foodName)}</div>
                                <div class="my-ad-meta">
                                    <span>${ad.discount}% off</span>
                                    <span>📊 ${ad.quantityLeft || 0} left</span>
                                    <span class="my-ad-status status-expired">expired</span>
                                </div>
                            </div>
                            <div class="my-ad-actions">
                                <button class="delete-ad-btn" onclick="deleteAd('${ad.id}', '${escapeHtml(ad.foodName)}')">🗑️</button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading my ads:', error);
                document.getElementById('myAdsList').innerHTML = '<div class="empty-state">error loading ads</div>';
            }
        }
        
        async function editAd(adId) {
            window.location.href = `advertise.html?edit=${adId}`;
        }
        
        async function deleteAd(adId, foodName) {
            if (confirm(`Delete "${foodName}"? This action cannot be undone.`)) {
                document.getElementById('loadingOverlay').style.display = 'flex';
                try {
                    const result = await Backend.deleteAd(adId);
                    if (result.success) {
                        showNotification(`"${foodName}" deleted`, 'success');
                        loadMyAds();
                    } else {
                        showNotification('Failed to delete ad', 'error');
                    }
                } catch (error) {
                    showNotification('Error deleting ad', 'error');
                } finally {
                    document.getElementById('loadingOverlay').style.display = 'none';
                }
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
        
        function showNotification(msg, type) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.className = `notification show ${type}`;
            setTimeout(() => notif.classList.remove('show'), 3000);
        }
        
        window.addEventListener('beforeunload', () => {
            if (html5QrCode && isScanning) {
                html5QrCode.stop().catch(console.error);
            }
        });
        
        window.startScanner = startScanner;
        window.stopScanner = stopScanner;
        window.hideScanner = hideScanner;
        window.submitAd = submitAd;
        window.handleImageUpload = handleImageUpload;
        window.removeImage = removeImage;
        window.switchTab = switchTab;
        window.loadMyAds = loadMyAds;
        window.editAd = editAd;
        window.deleteAd = deleteAd;
    </script>
</body>
</html>
