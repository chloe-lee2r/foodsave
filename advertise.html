<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>foodsave • post ad</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .app {
            width: 100%;
            max-width: 400px;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.03);
            position: relative;
        }
        
        /* Header */
        .header {
            padding: 20px 16px;
            background: white;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .back-link {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #007aff;
            font-size: 20px;
            transition: 0.2s;
        }
        
        .back-link:active {
            background: #e8ecf0;
            transform: scale(0.95);
        }
        
        .header h1 {
            flex: 1;
            font-size: 20px;
            font-weight: 600;
            color: #000;
        }
        
        .sync-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #f5f7fa;
            border: none;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .sync-btn:active {
            background: #e8ecf0;
            transform: rotate(180deg);
        }
        
        .logout-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #f5f7fa;
            border: none;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            color: #ff3b30;
        }
        
        .logout-btn:active {
            background: #e8ecf0;
            transform: scale(0.95);
        }
        
        /* Content */
        .content {
            padding: 16px;
            padding-bottom: 80px;
        }
        
        /* Shop Info */
        .shop-info {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        
        .shop-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .verification-badge {
            display: inline-block;
            padding: 4px 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            font-size: 11px;
            margin-top: 4px;
        }
        
        .shop-stats {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        
        .stat {
            flex: 1;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 600;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.8;
        }
        
        /* Form */
        .form-section {
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 16px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 6px;
            display: block;
        }
        
        .form-input, .form-select {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            background: #fafafa;
            transition: 0.2s;
        }
        
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .post-btn {
            width: 100%;
            padding: 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        
        .post-btn:active {
            background: #5a67d8;
            transform: scale(0.98);
        }
        
        .post-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .post-btn.verified {
            background: #34c759;
        }
        
        /* Ads Section */
        .ads-section {
            margin-top: 24px;
        }
        
        .ads-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .ads-title {
            font-size: 16px;
            font-weight: 600;
        }
        
        .refresh-btn {
            background: none;
            border: none;
            color: #667eea;
            font-size: 14px;
            padding: 4px 8px;
            cursor: pointer;
        }
        
        .ad-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #34c759;
            transition: 0.2s;
        }
        
        .ad-item.expiring-soon {
            border-left-color: #ff9500;
        }
        
        .ad-item.inactive {
            opacity: 0.6;
            border-left-color: #999;
        }
        
        .ad-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .ad-food {
            font-weight: 600;
            font-size: 16px;
        }
        
        .ad-discount {
            background: #34c759;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .ad-details {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .ad-stats {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #999;
            padding-top: 8px;
            border-top: 1px solid #e0e0e0;
        }
        
        .ad-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        .ad-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .edit-btn {
            background: #f0f0f0;
            color: #333;
        }
        
        .delete-btn {
            background: #ffebee;
            color: #ff3b30;
        }
        
        .deactivate-btn {
            background: #f0f0f0;
            color: #666;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            background: #f8f9fa;
            border-radius: 16px;
        }
        
        .empty-emoji {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .add-link {
            display: inline-block;
            margin-top: 16px;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 14px;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f0f0f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Notification */
        .notification {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1a1a;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            transition: 0.3s;
            z-index: 1000;
            white-space: nowrap;
            max-width: 90%;
        }
        
        .notification.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .notification.success {
            background: #34c759;
        }
        
        .notification.error {
            background: #ff3b30;
        }
        
        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-top: 1px solid #f0f0f0;
            padding: 8px 20px;
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }
        
        .nav-item {
            text-decoration: none;
            color: #999;
            font-size: 12px;
            text-align: center;
            transition: 0.2s;
            padding: 4px 0;
            flex: 1;
        }
        
        .nav-item.active {
            color: #667eea;
        }
        
        .nav-emoji {
            font-size: 20px;
            margin-bottom: 2px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <a href="index.html" class="back-link">←</a>
            <h1>post advertisement</h1>
            <button class="sync-btn" onclick="loadShopAds()">↻</button>
            <button class="logout-btn" onclick="logout()">🚪</button>
        </div>
        
        <!-- Content -->
        <div class="content">
            <!-- Shop Info -->
            <div class="shop-info" id="shopInfo">
                <div class="shop-name" id="shopNameDisplay">loading...</div>
                <div class="verification-badge" id="verificationBadge">⏳ verification pending</div>
                <div class="shop-stats">
                    <div class="stat">
                        <div class="stat-value" id="totalAds">0</div>
                        <div class="stat-label">active ads</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="totalViews">0</div>
                        <div class="stat-label">total views</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="totalClaimed">0</div>
                        <div class="stat-label">claimed</div>
                    </div>
                </div>
            </div>
            
            <!-- Post New Ad Form -->
            <div class="form-section">
                <div class="section-title">post new deal</div>
                
                <div class="form-group">
                    <label class="form-label">food item</label>
                    <input type="text" class="form-input" id="foodName" placeholder="e.g., organic milk">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">discount %</label>
                        <input type="number" class="form-input" id="discount" placeholder="20" min="1" max="100">
                    </div>
                    <div class="form-group">
                        <label class="form-label">original price</label>
                        <input type="number" class="form-input" id="price" placeholder="4.99" step="0.01" min="0">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">expiry date</label>
                    <input type="date" class="form-input" id="expiryDate">
                </div>
                
                <div class="form-group">
                    <label class="form-label">category</label>
                    <select class="form-select" id="category">
                        <option value="dairy">🥛 Dairy</option>
                        <option value="produce">🥬 Produce</option>
                        <option value="meat">🥩 Meat</option>
                        <option value="bakery">🥖 Bakery</option>
                        <option value="pantry">📦 Pantry</option>
                        <option value="frozen">❄️ Frozen</option>
                        <option value="other">📌 Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">description (optional)</label>
                    <input type="text" class="form-input" id="description" placeholder="e.g., organic, local">
                </div>
                
                <button class="post-btn" onclick="postAd()" id="postBtn">post deal</button>
                <p id="verifyWarning" style="color: #ff3b30; font-size: 13px; text-align: center; margin-top: 8px; display: none;">⚠️ verification required to post ads</p>
            </div>
            
            <!-- Active Ads -->
            <div class="ads-section">
                <div class="ads-header">
                    <div class="ads-title">your active deals</div>
                    <button class="refresh-btn" onclick="loadShopAds()">↻ refresh</button>
                </div>
                
                <div id="adsContainer">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        loading your ads...
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <a href="index.html" class="nav-item">
                <span class="nav-emoji">🏠</span>
                <span>home</span>
            </a>
            <a href="#" class="nav-item active">
                <span class="nav-emoji">📢</span>
                <span>post ad</span>
            </a>
            <a href="business-profile.html" class="nav-item">
                <span class="nav-emoji">👤</span>
                <span>profile</span>
            </a>
        </div>
    </div>
    
    <!-- Notification -->
    <div class="notification" id="notification"></div>
    
    <script src="https://npmcdn.com/parse/dist/parse.min.js"></script>
    <script src="backend.js"></script>
    
    <script>
        let currentShop = null;
        let shopAds = [];
        let isVerified = false;
        let businessRole = 'staff';
        
        document.addEventListener('DOMContentLoaded', async () => {
            // Check if user is logged in as advertiser
            const user = Backend.getCurrentUser();
            const role = localStorage.getItem('userRole');
            
            if (!user || role !== 'advertiser') {
                showNotification('Please login as shop owner', 'error');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
                return;
            }
            
            currentShop = {
                id: user.id,
                name: localStorage.getItem('businessName') || user.get('username')
            };
            
            isVerified = localStorage.getItem('businessVerified') === 'true';
            businessRole = localStorage.getItem('businessRole') || 'staff';
            
            document.getElementById('shopNameDisplay').textContent = currentShop.name;
            
            // Update verification badge
            const badge = document.getElementById('verificationBadge');
            const postBtn = document.getElementById('postBtn');
            const verifyWarning = document.getElementById('verifyWarning');
            
            if (isVerified) {
                badge.textContent = '✅ verified business';
                badge.style.background = 'rgba(52,199,89,0.2)';
                postBtn.classList.add('verified');
                verifyWarning.style.display = 'none';
            } else {
                badge.textContent = '⏳ verification pending';
                badge.style.background = 'rgba(255,59,48,0.2)';
                verifyWarning.style.display = 'block';
            }
            
            // Disable post button if not verified and not owner/manager
            if (!isVerified && businessRole === 'staff') {
                postBtn.disabled = true;
            }
            
            // Set default expiry date to tomorrow
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('expiryDate').value = tomorrow.toISOString().split('T')[0];
            
            // Load ads
            await loadShopAds();
        });
        
        async function postAd() {
            if (!isVerified) {
                showNotification('Business must be verified to post ads', 'error');
                return;
            }
            
            const foodName = document.getElementById('foodName').value.trim();
            const discount = document.getElementById('discount').value;
            const price = document.getElementById('price').value;
            const expiryDate = document.getElementById('expiryDate').value;
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value.trim();
            
            // Validate
            if (!foodName) {
                showNotification('Enter food name', 'error');
                return;
            }
            
            if (!discount || discount < 1 || discount > 100) {
                showNotification('Enter valid discount (1-100)', 'error');
                return;
            }
            
            if (!expiryDate) {
                showNotification('Select expiry date', 'error');
                return;
            }
            
            // Check expiry date is in future
            const today = new Date();
            today.setHours(0,0,0,0);
            const expiry = new Date(expiryDate);
            
            if (expiry < today) {
                showNotification('Expiry date must be in future', 'error');
                return;
            }
            
            // Disable button during post
            const postBtn = document.getElementById('postBtn');
            postBtn.disabled = true;
            postBtn.textContent = 'posting...';
            
            // Create ad
            const result = await Backend.createAd({
                foodName,
                discount,
                originalPrice: price || 0,
                expiryDate,
                category,
                description,
                shopName: currentShop.name
            });
            
            if (result.success) {
                showNotification('Deal posted successfully!', 'success');
                
                // Clear form
                document.getElementById('foodName').value = '';
                document.getElementById('discount').value = '';
                document.getElementById('price').value = '';
                document.getElementById('description').value = '';
                
                // Reload ads
                await loadShopAds();
            } else {
                showNotification(result.message || 'Failed to post', 'error');
            }
            
            // Re-enable button
            postBtn.disabled = false;
            postBtn.textContent = 'post deal';
        }
        
        async function loadShopAds() {
            const container = document.getElementById('adsContainer');
            
            try {
                shopAds = await Backend.getShopAds(currentShop.id);
                
                // Update stats
                document.getElementById('totalAds').textContent = shopAds.length;
                
                const totalViews = shopAds.reduce((sum, ad) => sum + (ad.views || 0), 0);
                const totalClaimed = shopAds.reduce((sum, ad) => sum + (ad.claimed || 0), 0);
                
                document.getElementById('totalViews').textContent = totalViews;
                document.getElementById('totalClaimed').textContent = totalClaimed;
                
                if (shopAds.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-emoji">📢</div>
                            <div>no active deals</div>
                            <div style="font-size:13px; margin-top:8px;">post your first deal above</div>
                        </div>
                    `;
                    return;
                }
                
                // Sort by expiry date
                shopAds.sort((a, b) => new Date(a.expiryDate) - new Date(b.expiryDate));
                
                container.innerHTML = shopAds.map(ad => {
                    const daysUntilExpiry = Math.ceil((new Date(ad.expiryDate) - new Date()) / (1000*60*60*24));
                    const isExpiringSoon = daysUntilExpiry <= 2;
                    
                    return `
                        <div class="ad-item ${isExpiringSoon ? 'expiring-soon' : ''} ${!ad.active ? 'inactive' : ''}">
                            <div class="ad-header">
                                <span class="ad-food">${ad.foodName}</span>
                                <span class="ad-discount">${ad.discount}% off</span>
                            </div>
                            
                            <div class="ad-details">
                                ${ad.originalPrice ? `<span>was $${ad.originalPrice}</span>` : ''}
                                <span>expires: ${new Date(ad.expiryDate).toLocaleDateString()}</span>
                                ${isExpiringSoon ? '<span style="color:#ff9500;">⚠️ soon</span>' : ''}
                            </div>
                            
                            <div class="ad-stats">
                                <span>👁️ ${ad.views || 0} views</span>
                                <span>✅ ${ad.claimed || 0} claimed</span>
                                <span>📅 ${new Date(ad.createdAt).toLocaleDateString()}</span>
                            </div>
                            
                            ${businessRole === 'owner' || businessRole === 'manager' ? `
                                <div class="ad-actions">
                                    <button class="ad-btn deactivate-btn" onclick="deactivateAd('${ad.id}')">deactivate</button>
                                    <button class="ad-btn delete-btn" onclick="deleteAd('${ad.id}')">delete</button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-emoji">❌</div>
                        <div>failed to load ads</div>
                    </div>
                `;
            }
        }
        
        async function deleteAd(adId) {
            if (!confirm('Delete this ad permanently?')) return;
            
            const result = await Backend.deleteAd(adId);
            
            if (result.success) {
                showNotification('Ad deleted', 'success');
                await loadShopAds();
            } else {
                showNotification(result.message, 'error');
            }
        }
        
        async function deactivateAd(adId) {
            const result = await Backend.updateAd(adId, { active: false });
            
            if (result.success) {
                showNotification('Ad deactivated', 'success');
                await loadShopAds();
            } else {
                showNotification(result.message, 'error');
            }
        }
        
        function showNotification(msg, type = 'info') {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.className = `notification show ${type}`;
            setTimeout(() => {
                notif.className = 'notification';
            }, 2000);
        }
        
        function logout() {
            window.location.href = 'index.html';
        }
        
        // Make functions global
        window.postAd = postAd;
        window.loadShopAds = loadShopAds;
        window.deleteAd = deleteAd;
        window.deactivateAd = deactivateAd;
        window.logout = logout;
    </script>
</body>
</html>
