<!DOCTYPE html>
<html>
<head>
    <title>Advertise Food</title>
    <style>
        body { font-family: Arial; background:#f0f2f5; padding:20px; }
        .container { max-width:500px; margin:auto; background:white; padding:20px; border-radius:10px; }
        input, button { width:100%; padding:10px; margin:8px 0; box-sizing: border-box; }
        button { background:#2196F3; color:white; border:none; cursor:pointer; }
        button:hover { background:#1976D2; }
        .ad { background:#fafafa; padding:10px; margin-top:10px; border-radius:6px; border-left: 4px solid #2196F3; }
        .logout { background:#f44336; }
        .logout:hover { background:#d32f2f; }
        a { display:block; margin-top:15px; text-align:center; text-decoration:none; color:#666; }
    </style>
</head>
<body>
<div class="container">
    <h2>📢 Advertise Expiring Food</h2>
    
    <input type="text" id="foodName" placeholder="Food name">
    <input type="number" id="discount" placeholder="Discount %" min="0" max="100">
    <input type="date" id="expiryDate">
    
    <button onclick="addAd()">Post Advertisement</button>
    <button class="logout" onclick="logout()">Logout</button>
    
    <h3>Your Current Ads</h3>
    <div id="adsList"></div>
    
    <a href="index.html">⬅ Back Home</a>
</div>

<script src="backend.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    // Check if shop owner is logged in
    const shop = localStorage.getItem("loggedInShop");
    if (!shop) {
        alert("Please login as shop owner first");
        window.location.href = "login.html";
        return;
    }
    displayAds();
});

function getAds() {
    return JSON.parse(localStorage.getItem("foodAds")) || [];
}

function saveAds(ads) {
    localStorage.setItem("foodAds", JSON.stringify(ads));
}

function addAd() {
    const food = document.getElementById("foodName").value;
    const discount = document.getElementById("discount").value;
    const expiry = document.getElementById("expiryDate").value;
    const shop = localStorage.getItem("loggedInShop");

    if (!food || !discount || !expiry) {
        alert("Fill all fields");
        return;
    }

    const ads = getAds();
    ads.push({ 
        food, 
        discount, 
        expiry, 
        shop,
        datePosted: new Date().toISOString()
    });
    saveAds(ads);
    
    // Clear form
    document.getElementById("foodName").value = "";
    document.getElementById("discount").value = "";
    document.getElementById("expiryDate").value = "";

    displayAds();
}

function displayAds() {
    const list = document.getElementById("adsList");
    list.innerHTML = "";

    const ads = getAds();
    const shop = localStorage.getItem("loggedInShop");

    const shopAds = ads.filter(ad => ad.shop === shop);
    
    if (shopAds.length === 0) {
        list.innerHTML = "<p>No ads posted yet.</p>";
        return;
    }

    shopAds.forEach(ad => {
        const div = document.createElement("div");
        div.className = "ad";
        div.innerHTML = `
            <strong>${ad.food}</strong><br>
            🏷️ ${ad.discount}% OFF<br>
            📅 Expires: ${ad.expiry}
        `;
        list.appendChild(div);
    });
}

function logout() {
    localStorage.clear();
    window.location.href = "index.html";
}
</script>
</body>
</html>
