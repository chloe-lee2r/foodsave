<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Find Stores - Discounted Food</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
        .store {
            background: #fafafa;
            padding: 15px;
            margin-top: 10px;
            border-radius: 6px;
            border-left: 4px solid #4CAF50;
        }
        .discount {
            color: #d9534f;
            font-weight: bold;
            font-size: 1.2em;
        }
        .logout {
            background: #333;
        }
        .logout:hover {
            background: #222;
        }
        a {
            display: block;
            margin-top: 15px;
            text-align: center;
            text-decoration: none;
            color: #666;
        }
        .welcome {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🔍 Find Discounted Food</h2>
    <div id="welcome" class="welcome"></div>
    <button class="logout" onclick="logout()">Logout</button>

    <h3>Search Food Item</h3>
    <input type="text" id="foodSearch" placeholder="Enter food name (e.g., Milk, Bread)">
    <button onclick="findStores()">Search</button>

    <div id="storeResults"></div>

    <a href="shoplist.html">⬅ Back to Shopping List</a>
    <a href="index.html">🏠 Home</a>
</div>

<script>
// Check consumer login
document.addEventListener("DOMContentLoaded", function() {
    const user = localStorage.getItem("loggedInConsumer") || localStorage.getItem("loggedInUser");
    if (!user) {
        alert("Please login first.");
        window.location.href = "login.html";
        return;
    }
    document.getElementById("welcome").innerHTML = "Welcome, <strong>" + user + "</strong>!";
});

function logout() {
    localStorage.clear();
    window.location.href = "index.html";
}

// Find stores that have discounted specific food
function findStores() {
    const keyword = document.getElementById("foodSearch").value.toLowerCase().trim();
    const ads = JSON.parse(localStorage.getItem("foodAds")) || [];
    const resultsDiv = document.getElementById("storeResults");
    resultsDiv.innerHTML = "";

    if (!keyword) {
        resultsDiv.innerHTML = "<p>Please enter a food name to search.</p>";
        return;
    }

    const matches = ads.filter(ad => ad.food.toLowerCase().includes(keyword));

    if (matches.length === 0) {
        resultsDiv.innerHTML = "<p>No stores found with discounted " + keyword + ".</p>";
        return;
    }

    matches.forEach(ad => {
        const div = document.createElement("div");
        div.className = "store";
        div.innerHTML = `
            <strong>${ad.food}</strong><br>
            Discount: <span class="discount">${ad.discount}% OFF</span><br>
            🏪 Shop: ${ad.shop}<br>
            📅 Expires: ${ad.expiry}
        `;
        resultsDiv.appendChild(div);
    });
}
</script>
</body>
</html>
