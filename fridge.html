<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>foodsave • fridge</title>
    <style>
        /* Keep all existing styles from before */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .app {
            width: 100%;
            max-width: 400px;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.03);
            position: relative;
        }
        
        /* Header */
        .header {
            padding: 20px 16px;
            background: white;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .back-link {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #007aff;
            font-size: 20px;
        }
        
        .header h1 {
            flex: 1;
            font-size: 20px;
            font-weight: 600;
        }
        
        .logout-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #f5f7fa;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #ff3b30;
        }
        
        /* Stats Card */
        .stats-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 16px;
            margin: 16px;
            display: flex;
            justify-content: space-between;
        }
        
        .stat-item {
            text-align: center;
            flex: 1;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }
        
        /* Add Section */
        .add-section {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 16px;
            margin: 16px;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            margin-bottom: 12px;
        }
        
        .dropdown, .input-field {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            background: white;
            margin-bottom: 12px;
        }
        
        .add-btn {
            width: 100%;
            padding: 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* Items */
        .items-header {
            display: flex;
            justify-content: space-between;
            margin: 16px;
        }
        
        .items-title {
            font-weight: 600;
        }
        
        .sort-btn {
            background: none;
            border: none;
            color: #667eea;
        }
        
        .items-container {
            margin: 16px;
            margin-bottom: 80px;
        }
        
        .item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid #34c759;
        }
        
        .item.expired {
            border-left-color: #ff3b30;
            background: #ffebee;
        }
        
        .item.expiring-soon {
            border-left-color: #ff9500;
            background: #fff3e0;
        }
        
        .item-icon {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .item-details {
            flex: 1;
        }
        
        .item-name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .item-expiry {
            font-size: 13px;
            color: #666;
        }
        
        .item-actions {
            display: flex;
            gap: 4px;
        }
        
        .item-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: white;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .delete-btn {
            color: #ff3b30;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .empty-emoji {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        
        .add-link {
            display: inline-block;
            margin-top: 16px;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 25px;
        }
        
        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-top: 1px solid #f0f0f0;
            padding: 8px 20px;
            display: flex;
            justify-content: space-around;
        }
        
        .nav-item {
            text-decoration: none;
            color: #999;
            font-size: 12px;
            text-align: center;
            flex: 1;
        }
        
        .nav-item.active {
            color: #667eea;
        }
        
        .nav-emoji {
            font-size: 20px;
            margin-bottom: 2px;
            display: block;
        }
        
        /* Notification */
        .notification {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1a1a;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            transition: 0.3s;
            z-index: 1000;
        }
        
        .notification.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .notification.success {
            background: #34c759;
        }
        
        .notification.error {
            background: #ff3b30;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <a href="index.html" class="back-link">←</a>
            <h1>my fridge</h1>
            <button class="logout-btn" onclick="logout()">🚪</button>
        </div>
        
        <!-- Stats -->
        <div class="stats-card">
            <div class="stat-item">
                <div class="stat-value" id="totalItems">0</div>
                <div class="stat-label">total</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="expiringItems">0</div>
                <div class="stat-label">expiring soon</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="expiredItems">0</div>
                <div class="stat-label">expired</div>
            </div>
        </div>
        
        <!-- Add Item -->
        <div class="add-section">
            <div class="section-title">➕ add to fridge</div>
            
            <select id="foodDropdown" class="dropdown">
                <option value="">Select food item</option>
            </select>
            
            <input type="text" id="foodName" class="input-field" placeholder="Or type custom food name">
            <input type="date" id="expiryDate" class="input-field">
            
            <button class="add-btn" onclick="addItem()">add to fridge</button>
        </div>
        
        <!-- Items -->
        <div class="items-header">
            <span class="items-title">your items</span>
            <button class="sort-btn" onclick="toggleSort()">sort by date ↓</button>
        </div>
        
        <div class="items-container" id="itemsContainer">
            <!-- Items loaded here -->
        </div>
        
        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <a href="index.html" class="nav-item">
                <span class="nav-emoji">🏠</span>
                <span>home</span>
            </a>
            <a href="shoplist.html" class="nav-item">
                <span class="nav-emoji">🛒</span>
                <span>lists</span>
            </a>
            <a href="find-stores.html" class="nav-item">
                <span class="nav-emoji">🔍</span>
                <span>deals</span>
            </a>
            <a href="#" class="nav-item active">
                <span class="nav-emoji">🧊</span>
                <span>fridge</span>
            </a>
        </div>
    </div>
    
    <!-- Notification -->
    <div class="notification" id="notification"></div>
    
    <script>
        const commonFoods = [
            "Milk", "Eggs", "Bread", "Rice", "Chicken",
            "Beef", "Apples", "Bananas", "Cheese", "Yogurt",
            "Tomatoes", "Lettuce", "Carrots", "Potatoes", "Onions",
            "Butter", "Orange Juice", "Fish", "Pork", "Spinach"
        ];
        
        let sortAscending = true;
        
        document.addEventListener("DOMContentLoaded", function() {
            // Check login
            const user = localStorage.getItem("loggedInUser");
            if (!user) {
                window.location.href = "login.html";
                return;
            }
            populateDropdown();
            displayItems();
        });
        
        function getItems() {
            return JSON.parse(localStorage.getItem("foodItems")) || [];
        }
        
        function saveItems(items) {
            localStorage.setItem("foodItems", JSON.stringify(items));
            displayItems();
        }
        
        function populateDropdown() {
            const dropdown = document.getElementById("foodDropdown");
            dropdown.innerHTML = '<option value="">Select food item</option>';
            
            const items = getItems();
            const pastItems = items.map(item => item.name);
            const allFoods = [...new Set([...commonFoods, ...pastItems])].sort();
            
            allFoods.forEach(food => {
                const option = document.createElement("option");
                option.value = food;
                option.textContent = food;
                dropdown.appendChild(option);
            });
        }
        
        function addItem() {
            const dropdownValue = document.getElementById("foodDropdown").value;
            const manualInput = document.getElementById("foodName").value.trim();
            const expiry = document.getElementById("expiryDate").value;
            
            const name = manualInput || dropdownValue;
            
            if (!name || !expiry) {
                showNotification("Please select/type a food and choose expiry date.", "error");
                return;
            }
            
            // Validate expiry date is in the future
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const expiryDate = new Date(expiry);
            
            if (expiryDate < today) {
                showNotification("Expiry date cannot be in the past!", "error");
                return;
            }
            
            const items = getItems();
            items.push({ 
                name, 
                expiry,
                addedDate: new Date().toISOString()
            });
            saveItems(items);
            
            document.getElementById("foodName").value = "";
            document.getElementById("foodDropdown").value = "";
            document.getElementById("expiryDate").value = "";
            
            populateDropdown();
            showNotification(`Added ${name} to fridge`, "success");
        }
        
        function deleteItem(index) {
            if (confirm("Remove this item from fridge?")) {
                const items = getItems();
                items.splice(index, 1);
                saveItems(items);
                populateDropdown();
                showNotification("Item removed", "success");
            }
        }
        
        function duplicateItem(index) {
            const items = getItems();
            const original = items[index];
            items.push({ 
                name: original.name, 
                expiry: original.expiry,
                addedDate: new Date().toISOString()
            });
            saveItems(items);
            populateDropdown();
            showNotification(`Added another ${original.name}`, "success");
        }
        
        function toggleSort() {
            sortAscending = !sortAscending;
            displayItems();
        }
        
        function displayItems() {
            const container = document.getElementById("itemsContainer");
            const items = getItems();
            
            // Update stats
            updateStats(items);
            
            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-emoji">🧊</div>
                        <div>your fridge is empty</div>
                        <div style="font-size:13px; margin-top:8px;">add items to track expiry dates</div>
                        <a href="#" class="add-link" onclick="document.getElementById('foodName').focus()">➕ add items</a>
                    </div>
                `;
                return;
            }
            
            // Sort items
            const sortedItems = [...items].sort((a, b) => {
                const dateA = new Date(a.expiry);
                const dateB = new Date(b.expiry);
                return sortAscending ? dateA - dateB : dateB - dateA;
            });
            
            container.innerHTML = sortedItems.map((item, index) => {
                const originalIndex = items.findIndex(i => 
                    i.name === item.name && 
                    i.expiry === item.expiry &&
                    i.addedDate === item.addedDate
                );
                
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const expiryDate = new Date(item.expiry);
                expiryDate.setHours(0, 0, 0, 0);
                const diffDays = Math.round((expiryDate - today) / (1000 * 60 * 60 * 24));
                
                let status = "";
                let statusClass = "";
                let icon = "✅";
                
                if (diffDays < 0) {
                    status = "expired";
                    statusClass = "expired";
                    icon = "⚠️";
                } else if (diffDays === 0) {
                    status = "expires today!";
                    statusClass = "expiring-soon";
                    icon = "🔥";
                } else if (diffDays <= 3) {
                    status = `expires in ${diffDays} days`;
                    statusClass = "expiring-soon";
                    icon = "⚠️";
                } else {
                    status = `good for ${diffDays} days`;
                }
                
                const foodEmoji = getFoodEmoji(item.name);
                
                return `
                    <div class="item ${statusClass}">
                        <div class="item-icon">${foodEmoji}</div>
                        <div class="item-details">
                            <div class="item-name">${item.name}</div>
                            <div class="item-expiry">
                                📅 ${item.expiry} • ${status}
                            </div>
                        </div>
                        <div class="item-actions">
                            <button class="item-btn" onclick="duplicateItem(${originalIndex})">📋</button>
                            <button class="item-btn delete-btn" onclick="deleteItem(${originalIndex})">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function getFoodEmoji(name) {
            name = name.toLowerCase();
            if (name.includes('milk') || name.includes('cheese') || name.includes('yogurt')) return '🥛';
            if (name.includes('egg')) return '🥚';
            if (name.includes('bread')) return '🍞';
            if (name.includes('chicken') || name.includes('beef') || name.includes('pork') || name.includes('fish')) return '🥩';
            if (name.includes('apple')) return '🍎';
            if (name.includes('banana')) return '🍌';
            if (name.includes('rice')) return '🍚';
            if (name.includes('pasta')) return '🍝';
            if (name.includes('carrot') || name.includes('lettuce') || name.includes('tomato')) return '🥬';
            return '🍽️';
        }
        
        function updateStats(items) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            const expiring = items.filter(item => {
                const expiry = new Date(item.expiry);
                expiry.setHours(0, 0, 0, 0);
                const diff = Math.round((expiry - today) / (1000 * 60 * 60 * 24));
                return diff >= 0 && diff <= 3;
            }).length;
            
            const expired = items.filter(item => {
                const expiry = new Date(item.expiry);
                expiry.setHours(0, 0, 0, 0);
                return expiry < today;
            }).length;
            
            document.getElementById('totalItems').textContent = items.length;
            document.getElementById('expiringItems').textContent = expiring;
            document.getElementById('expiredItems').textContent = expired;
        }
        
        function logout() {
            window.location.href = "index.html";
        }
        
        function showNotification(message, type = 'info') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification show ${type}`;
            setTimeout(() => {
                notification.classList.remove('show');
            }, 2000);
        }
        
        // Make functions global
        window.addItem = addItem;
        window.deleteItem = deleteItem;
        window.duplicateItem = duplicateItem;
        window.toggleSort = toggleSort;
        window.logout = logout;
    </script>
</body>
</html>
