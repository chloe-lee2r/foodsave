<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>foodsavvi • fridge</title>
    <link rel="icon" type="image/png" href="assets/icon.png">
    <link rel="shortcut icon" type="image/png" href="assets/icon.png">
    <style>
        @font-face {
            font-family: 'RusticStory';
            src: url('./assets/RusticStory-R9vKM.ttf') format('truetype'),
                 url('./assets/RusticStory-1jDPL.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'RusticStory', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .app {
            width: 100%;
            max-width: 400px;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.03);
        }
        
        .header {
            padding: 20px 16px;
            background: white;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .back-link {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #007aff;
            font-size: 20px;
        }
        
        .header h1 {
            flex: 1;
            font-size: 20px;
            font-weight: 600;
        }
        
        .sync-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #f5f7fa;
            border: none;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .sync-btn:active {
            background: #e8ecf0;
            transform: rotate(180deg);
        }
        
        /* logout button removed */
        
        .content {
            padding: 16px;
            padding-bottom: 80px;
        }
        
        /* ========== NEW FRIDGE STATUS BOX (homepage style) ========== */
        .fridge-summary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 24px;
            animation: fadeInScale 0.5s ease;
            position: relative;
            overflow: hidden;
        }
        .fridge-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .fridge-header h3 {
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .fridge-header h3 img {
            width: 20px;
            height: 20px;
            vertical-align: middle;
        }
        .stats-row {
            display: flex;
            justify-content: space-around;
            text-align: center;
            margin: 20px 0;
        }
        .stat-box {
            flex: 1;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 16px;
            padding: 12px 0;
        }
        .stat-box:hover {
            transform: scale(1.05);
            background: rgba(255,255,255,0.1);
        }
        .stat-box:active {
            transform: scale(0.95);
        }
        .stat-number {
            font-size: 36px;
            font-weight: bold;
        }
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
        .stat-box.good .stat-number {
            color: #4cd964;
        }
        .stat-box.expiring .stat-number {
            color: #ffcc00;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .stat-box.expired .stat-number {
            color: #ff6b6b;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        /* ========== END NEW STATUS BOX ========== */
        
        .add-section {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            margin-bottom: 12px;
        }
        
        .dropdown, .input-field {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            background: white;
            margin-bottom: 12px;
        }
        
        .add-btn {
            width: 100%;
            padding: 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .items-header {
            display: flex;
            justify-content: space-between;
            margin: 16px 0;
        }
        
        .items-title {
            font-weight: 600;
        }
        
        .sort-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
        }
        
        .items-container {
            margin-bottom: 20px;
        }
        
        .item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid #34c759;
        }
        
        .item.expired {
            border-left-color: #ff3b30;
            background: #ffebee;
        }
        
        .item.expiring-soon {
            border-left-color: #ff9500;
            background: #fff3e0;
        }
        
        .item-icon {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .item-details {
            flex: 1;
        }
        
        .item-name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .item-expiry {
            font-size: 13px;
            color: #666;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .days-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .days-badge.good {
            background: #e8f5e8;
            color: #34c759;
        }
        
        .days-badge.warning {
            background: #fff3e0;
            color: #ff9500;
        }
        
        .days-badge.expired {
            background: #ffebee;
            color: #ff3b30;
        }
        
        .item-actions {
            display: flex;
            gap: 4px;
        }
        
        .item-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: white;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .item-btn:active {
            transform: scale(0.95);
        }
        
        .edit-btn {
            color: #667eea;
        }
        
        .delete-btn {
            color: #ff3b30;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .empty-emoji {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        
        .add-link {
            display: inline-block;
            margin-top: 16px;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 25px;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 100;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 320px;
        }
        
        .modal-content h3 {
            margin-bottom: 16px;
            font-size: 18px;
        }
        
        .modal-content input {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 16px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .modal-buttons .primary {
            background: #667eea;
            color: white;
        }
        
        .modal-buttons .secondary {
            background: #f0f0f0;
            color: #666;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-top: 1px solid #f0f0f0;
            padding: 8px 20px;
            display: flex;
            justify-content: space-around;
        }
        
        .nav-item {
            text-decoration: none;
            color: #999;
            font-size: 12px;
            text-align: center;
            flex: 1;
        }
        
        .nav-item.active {
            color: #007aff;
        }
        
        .nav-emoji {
            font-size: 20px;
            margin-bottom: 2px;
            display: block;
            height: 24px;
            line-height: 24px;
        }
        
        /* Style for image icons in the nav */
        .nav-emoji img {
            width: auto;
            height: 100%;
            vertical-align: middle;
        }
        
        /* Fixed notification: default green, error red */
        .notification {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #34c759;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            transition: 0.3s;
            z-index: 1000;
            text-align: center;
            max-width: 90%;
            opacity: 0;
            pointer-events: none;
        }
        
        .notification.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        
        .notification.success {
            background: #34c759;
        }
        
        .notification.error {
            background: #ff3b30;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <a href="index.html" class="back-link">←</a>
            <h1>my fridge</h1>
            <button class="sync-btn" onclick="syncWithCloud()">↻</button>
            <!-- logout button removed -->
        </div>
        
        <div class="content">
            <!-- NEW FRIDGE STATUS BOX (homepage style) -->
            <div class="fridge-summary">
                <div class="fridge-header">
                    <h3><img src="assets/fridge.png" alt="fridge"> fridge status</h3>
                </div>
                <div class="stats-row">
                    <div class="stat-box good">
                        <div class="stat-number" id="totalItems">0</div>
                        <div class="stat-label">total items</div>
                    </div>
                    <div class="stat-box expiring">
                        <div class="stat-number" id="expiringItems">0</div>
                        <div class="stat-label">expiring soon</div>
                    </div>
                    <div class="stat-box expired">
                        <div class="stat-number" id="expiredItems">0</div>
                        <div class="stat-label">expired</div>
                    </div>
                </div>
            </div>
            
            <div class="add-section">
                <div class="section-title">➕ add to fridge</div>
                <select id="foodDropdown" class="dropdown">
                    <option value="">Select food</option>
                </select>
                <input type="text" id="foodName" class="input-field" placeholder="Or type custom food">
                <input type="date" id="expiryDate" class="input-field">
                <button class="add-btn" onclick="addItem()">add to fridge</button>
            </div>
            
            <div class="items-header">
                <span class="items-title">your items</span>
                <button class="sort-btn" onclick="toggleSort()">sort by date ↓</button>
            </div>
            
            <div class="items-container" id="itemsContainer">
                <!-- Items loaded here -->
            </div>
        </div>
        
        <!-- Standard consumer bottom nav: home, deals, lists, fridge -->
        <div class="bottom-nav">
            <a href="index.html" class="nav-item">
                <span class="nav-emoji">🏠</span>
                <span>home</span>
            </a>
            <a href="find-stores.html" class="nav-item">
                <span class="nav-emoji">🔍</span>
                <span>deals</span>
            </a>
            <a href="shoplist.html" class="nav-item">
                <span class="nav-emoji">📝</span>
                <span>lists</span>
            </a>
            <a href="#" class="nav-item active">
                <span class="nav-emoji"><img src="assets/fridge.png" alt="fridge"></span>
                <span>fridge</span>
            </a>
        </div>
    </div>
    
    <!-- Edit Expiry Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3>✏️ edit expiry date</h3>
            <input type="date" id="editExpiryDate" class="edit-input">
            <div class="modal-buttons">
                <button class="primary" onclick="saveEditExpiry()">save</button>
                <button class="secondary" onclick="closeEditModal()">cancel</button>
            </div>
        </div>
    </div>
    
    <div class="notification" id="notification"></div>
    
    <script src="https://npmcdn.com/parse/dist/parse.min.js"></script>
    <script src="backend.js"></script>
    
    <script>
        const commonFoods = [
            "Milk", "Eggs", "Bread", "Rice", "Chicken",
            "Beef", "Apples", "Bananas", "Cheese", "Yogurt"
        ];
        
        let sortAscending = true;
        let items = [];
        let editingIndex = -1;
        let notificationTimeout = null;
        
        document.addEventListener("DOMContentLoaded", async function() {
            const user = Backend.getCurrentUser();
            if (!user) {
                window.location.href = "login.html";
                return;
            }
            await loadFridge();
            populateDropdown();
            displayItems();
        });
        
        async function loadFridge() {
            try {
                const cloudItems = await Backend.loadFridgeItems();
                if (cloudItems && cloudItems.length > 0) {
                    items = cloudItems;
                } else {
                    items = JSON.parse(localStorage.getItem("foodItems")) || [];
                }
            } catch (error) {
                items = JSON.parse(localStorage.getItem("foodItems")) || [];
            }
        }
        
        async function saveFridge() {
            try {
                await Backend.saveFridgeItems(items);
                localStorage.setItem("foodItems", JSON.stringify(items));
            } catch (error) {
                localStorage.setItem("foodItems", JSON.stringify(items));
            }
        }
        
        function populateDropdown() {
            const dropdown = document.getElementById("foodDropdown");
            dropdown.innerHTML = '<option value="">Select food</option>';
            const pastItems = items.map(item => item.name);
            const allFoods = [...new Set([...commonFoods, ...pastItems])].sort();
            
            allFoods.forEach(food => {
                const option = document.createElement("option");
                option.value = food;
                option.textContent = food;
                dropdown.appendChild(option);
            });
        }
        
        async function addItem() {
            const name = document.getElementById("foodName").value.trim() || document.getElementById("foodDropdown").value;
            const expiry = document.getElementById("expiryDate").value;
            
            if (!name || !expiry) {
                showNotification("Please fill all fields", "error");
                return;
            }
            
            items.push({ name, expiry, addedDate: new Date().toISOString() });
            await saveFridge();
            
            document.getElementById("foodName").value = "";
            document.getElementById("foodDropdown").value = "";
            document.getElementById("expiryDate").value = "";
            
            populateDropdown();
            displayItems();
            showNotification(`Added ${name}`, "success");
        }
        
        async function deleteItem(index) {
            if (confirm("Remove this item?")) {
                items.splice(index, 1);
                await saveFridge();
                populateDropdown();
                displayItems();
                showNotification("Item removed", "success");
            }
        }
        
        function editItem(index) {
            editingIndex = index;
            const item = items[index];
            document.getElementById("editExpiryDate").value = item.expiry;
            document.getElementById("editModal").classList.add("show");
        }
        
        async function saveEditExpiry() {
            const newExpiry = document.getElementById("editExpiryDate").value;
            
            if (!newExpiry) {
                showNotification("Please select a date", "error");
                return;
            }
            
            if (editingIndex >= 0 && editingIndex < items.length) {
                const oldExpiry = items[editingIndex].expiry;
                items[editingIndex].expiry = newExpiry;
                await saveFridge();
                displayItems();
                showNotification(`Expiry date updated from ${oldExpiry} to ${newExpiry}`, "success");
            }
            
            closeEditModal();
        }
        
        function closeEditModal() {
            document.getElementById("editModal").classList.remove("show");
            editingIndex = -1;
        }
        
        function toggleSort() {
            sortAscending = !sortAscending;
            displayItems();
        }
        
        function displayItems() {
            const container = document.getElementById("itemsContainer");
            
            updateStats(items);
            
            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-emoji">🧊</div>
                        <div>your fridge is empty</div>
                        <a href="#" class="add-link" onclick="document.getElementById('foodName').focus()">➕ add items</a>
                    </div>
                `;
                return;
            }
            
            const sortedItems = [...items].sort((a, b) => {
                return sortAscending ? new Date(a.expiry) - new Date(b.expiry) : new Date(b.expiry) - new Date(a.expiry);
            });
            
            container.innerHTML = sortedItems.map((item, index) => {
                const originalIndex = items.findIndex(i => i.name === item.name && i.expiry === item.expiry && i.addedDate === item.addedDate);
                const today = new Date();
                today.setHours(0,0,0,0);
                const expiry = new Date(item.expiry);
                expiry.setHours(0,0,0,0);
                const diffDays = Math.round((expiry - today) / (1000*60*60*24));
                
                let statusClass = "";
                let statusText = "";
                let badgeClass = "good";
                
                if (diffDays < 0) {
                    statusClass = "expired";
                    statusText = `expired ${Math.abs(diffDays)} days ago`;
                    badgeClass = "expired";
                } else if (diffDays === 0) {
                    statusClass = "expiring-soon";
                    statusText = `expires TODAY!`;
                    badgeClass = "warning";
                } else if (diffDays <= 3) {
                    statusClass = "expiring-soon";
                    statusText = `${diffDays} days left`;
                    badgeClass = "warning";
                } else {
                    statusText = `${diffDays} days left`;
                    badgeClass = "good";
                }
                
                const foodEmoji = getFoodEmoji(item.name);
                
                return `
                    <div class="item ${statusClass}">
                        <div class="item-icon">${foodEmoji}</div>
                        <div class="item-details">
                            <div class="item-name">${escapeHtml(item.name)}</div>
                            <div class="item-expiry">
                                <span>📅 ${item.expiry}</span>
                                <span class="days-badge ${badgeClass}">${statusText}</span>
                            </div>
                        </div>
                        <div class="item-actions">
                            <button class="item-btn edit-btn" onclick="editItem(${originalIndex})">✏️</button>
                            <button class="item-btn delete-btn" onclick="deleteItem(${originalIndex})">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function getFoodEmoji(name) {
            name = name.toLowerCase();
            if (name.includes('milk') || name.includes('cheese') || name.includes('yogurt')) return '🥛';
            if (name.includes('egg')) return '🥚';
            if (name.includes('bread')) return '🍞';
            if (name.includes('chicken') || name.includes('beef') || name.includes('pork') || name.includes('fish')) return '🥩';
            if (name.includes('apple')) return '🍎';
            if (name.includes('banana')) return '🍌';
            if (name.includes('rice')) return '🍚';
            if (name.includes('pasta')) return '🍝';
            if (name.includes('carrot') || name.includes('lettuce') || name.includes('tomato')) return '🥬';
            return '🍽️';
        }
        
        function updateStats(items) {
            const today = new Date();
            today.setHours(0,0,0,0);
            
            let expiring = 0, expired = 0;
            
            items.forEach(item => {
                const expiry = new Date(item.expiry);
                expiry.setHours(0,0,0,0);
                const diff = Math.round((expiry - today) / (1000*60*60*24));
                
                if (diff < 0) expired++;
                else if (diff <= 3) expiring++;
            });
            
            document.getElementById('totalItems').textContent = items.length;
            document.getElementById('expiringItems').textContent = expiring;
            document.getElementById('expiredItems').textContent = expired;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        async function syncWithCloud() {
            showNotification("Syncing...", "info");
            await saveFridge();
            await loadFridge();
            displayItems();
            showNotification("Synced!", "success");
        }
        
        function showNotification(message, type) {
            const notif = document.getElementById('notification');
            if (notificationTimeout) clearTimeout(notificationTimeout);
            notif.textContent = message;
            notif.className = `notification show ${type}`;
            notificationTimeout = setTimeout(() => {
                notif.className = 'notification';
                notificationTimeout = null;
            }, 2000);
        }
        
        // logout function kept but no button triggers it
        function logout() {
            window.location.href = "index.html";
        }
        
        // Make functions global
        window.addItem = addItem;
        window.deleteItem = deleteItem;
        window.editItem = editItem;
        window.saveEditExpiry = saveEditExpiry;
        window.closeEditModal = closeEditModal;
        window.toggleSort = toggleSort;
        window.syncWithCloud = syncWithCloud;
        window.logout = logout;
    </script>
</body>
</html>
