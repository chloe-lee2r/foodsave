<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>foodsavvi • community sharing</title>
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icon.png">
    <link rel="icon" type="image/png" href="assets/icon.png">
    <link rel="shortcut icon" type="image/png" href="assets/icon.png">
    <meta name="theme-color" content="#ee5a24">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @font-face {
            font-family: 'RusticStory';
            src: url('./assets/RusticStory-R9vKM.ttf') format('truetype'),
                 url('./assets/RusticStory-1jDPL.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'RusticStory', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .app {
            width: 100%;
            max-width: 400px;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.03);
            position: relative;
            padding-bottom: 80px;
        }
        
        .header {
            padding: 30px 20px 20px;
            background: linear-gradient(135deg, #FF6B6B, #ee5a24);
            color: white;
            position: relative;
        }
        
        .back-btn {
            position: absolute;
            top: 30px;
            left: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
        }
        
        .header h1 { font-size: 24px; margin-left: 60px; margin-bottom: 4px; }
        .header-subtitle { font-size: 14px; opacity: 0.9; margin-left: 60px; }
        
        /* Removed absolute share button from header */
        
        .content { padding: 20px; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab {
            padding: 10px 20px;
            background: #f5f7fa;
            border: none;
            border-radius: 20px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            white-space: nowrap;
            font-family: inherit;
            font-size: 14px;
        }
        .tab.active { background: #ee5a24; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .map-container {
            width: 100%;
            height: 300px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
            background: #f0f0f0;
        }
        
        .location-btn {
            background: #ee5a24; color: white; border: none;
            padding: 12px 20px; border-radius: 25px; font-size: 14px;
            width: 100%; cursor: pointer; margin-bottom: 16px; font-family: inherit;
        }
        
        .distance-filter { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .distance-chip {
            padding: 6px 14px; background: #f5f7fa; border: 1px solid #e0e0e0;
            border-radius: 20px; font-size: 12px; cursor: pointer; font-family: inherit; color: #666;
        }
        .distance-chip.active { background: #ee5a24; color: white; border-color: #ee5a24; }
        
        .sharing-card {
            background: white; border-radius: 16px; padding: 16px;
            margin-bottom: 12px; border: 1px solid #f0f0f0; transition: 0.2s; cursor: pointer;
        }
        .sharing-card:active { transform: scale(0.98); }
        .sharing-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .sharing-user { display: flex; align-items: center; gap: 10px; }
        .user-avatar-small {
            width: 40px; height: 40px; background: #ffebee; border-radius: 20px;
            display: flex; align-items: center; justify-content: center; font-size: 18px; overflow: hidden;
        }
        .user-avatar-small img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .user-info-small h4 { font-size: 14px; margin-bottom: 2px; color: #333; }
        .user-info-small .distance { font-size: 12px; color: #999; }
        
        .sharing-badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge-free { background: #e8f5e8; color: #34c759; }
        .badge-swap { background: #fff3e0; color: #ff9500; }
        .badge-claimed { background: #e3f2fd; color: #007aff; }
        
        .sharing-food { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
        .food-tag {
            padding: 6px 12px; background: #f8f9fa; border-radius: 20px;
            font-size: 13px; display: flex; align-items: center; gap: 4px;
        }
        .food-tag .emoji { font-size: 16px; }
        
        .sharing-reason {
            font-size: 12px; color: #999; margin-bottom: 8px;
            font-style: italic; background: #fffbf0; padding: 6px 10px;
            border-radius: 8px; border-left: 3px solid #ff9500;
        }
        
        .sharing-footer { display: flex; justify-content: space-between; align-items: center; }
        .sharing-time { font-size: 12px; color: #999; }
        
        .claim-btn {
            background: #34c759; color: white; border: none;
            padding: 8px 20px; border-radius: 20px; font-size: 13px;
            font-weight: 600; cursor: pointer; font-family: inherit;
        }
        .claim-btn:disabled { background: #ccc; cursor: not-allowed; }
        .claim-btn.claimed { background: #999; }
        
        .stats-bar { display: flex; gap: 12px; margin-bottom: 20px; }
        .stat-card {
            flex: 1; background: linear-gradient(135deg, #FF6B6B, #ee5a24);
            color: white; padding: 16px; border-radius: 12px; text-align: center;
        }
        .stat-number { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
        .stat-label { font-size: 11px; opacity: 0.9; }
        
        .share-action-btn {
            display: block;
            background: white;
            border: 2px solid #ee5a24;
            color: #ee5a24;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            margin-bottom: 16px;
            font-family: inherit;
            text-align: center;
            transition: 0.2s;
        }
        .share-action-btn:hover { background: #fff5f0; }
        .share-action-btn:active { transform: scale(0.98); }
        
        .empty-state { text-align: center; padding: 40px 20px; color: #999; }
        .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
        
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            max-width: 400px; margin: 0 auto; background: white;
            border-top: 1px solid #f0f0f0; padding: 8px 20px;
            display: flex; justify-content: space-around; z-index: 100;
        }
        .nav-item { text-decoration: none; color: #999; font-size: 12px; text-align: center; flex: 1; padding: 4px 0; cursor: pointer; position: relative; }
        .nav-item.active { color: #ee5a24; }
        .nav-emoji { font-size: 20px; margin-bottom: 2px; display: block; height: 24px; line-height: 24px; }
        .nav-emoji img { width: auto; height: 100%; vertical-align: middle; }
        .notif-badge {
            position: absolute; top: -5px; right: 5px;
            background: #ff3b30; color: white; font-size: 10px;
            width: 18px; height: 18px; border-radius: 9px;
            display: none; align-items: center; justify-content: center;
        }
        
        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); display: flex; align-items: center;
            justify-content: center; z-index: 1000; display: none;
        }
        .modal-content {
            background: white; border-radius: 20px; width: 90%;
            max-width: 340px; padding: 24px; max-height: 80vh; overflow-y: auto;
        }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; text-align: center; }
        .detail-item { margin-bottom: 12px; }
        .detail-label { font-size: 12px; color: #999; margin-bottom: 4px; }
        .detail-value { font-size: 14px; color: #333; font-weight: 500; }
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .modal-btn {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600;
        }
        .modal-btn.confirm { background: #34c759; color: white; }
        .modal-btn.cancel { background: #999; color: white; }
        
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); display: flex; align-items: center;
            justify-content: center; z-index: 2000; display: none;
        }
        .loading-spinner {
            width: 50px; height: 50px; border: 4px solid white;
            border-top-color: #ee5a24; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .search-box {
            width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0;
            border-radius: 25px; font-family: inherit; font-size: 14px;
            margin-bottom: 16px; outline: none;
        }
        .search-box:focus { border-color: #ee5a24; }
        
        .refresh-btn {
            background: none; border: none; font-size: 18px;
            cursor: pointer; padding: 4px 8px; color: #ee5a24;
        }
        
        .section-title {
            font-size: 16px; font-weight: 600; color: #1a1a1a;
            margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">back</button>
        <h1> Community Sharing</h1>
        <div class="header-subtitle">neighbours helping neighbours</div>
    </div>
    
    <div class="content">
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-number" id="totalShares">0</div>
                <div class="stat-label">active shares</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="nearbyCount">0</div>
                <div class="stat-label">near you</div>
            </div>
        </div>
        
        <!-- Moved share button here as a prominent action -->
        <button class="share-action-btn" onclick="window.location.href='community-share.html'">
            + share your extra food
        </button>
        
        <input type="text" class="search-box" placeholder="🔍 search food..." id="searchInput" onkeyup="filterShares()">
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('list')">📋 list</button>
            <button class="tab" onclick="switchTab('map')">🗺️ map</button>
        </div>
        
        <div class="tab-content active" id="listTab">
            <div class="distance-filter">
                <button class="distance-chip active" onclick="filterByDistance('all')">all</button>
                <button class="distance-chip" onclick="filterByDistance(1)">1 km</button>
                <button class="distance-chip" onclick="filterByDistance(3)">3 km</button>
                <button class="distance-chip" onclick="filterByDistance(5)">5 km</button>
                <button class="distance-chip" onclick="filterByDistance(10)">10 km</button>
            </div>
            <div class="section-title">
                <span>available shares</span>
                <button class="refresh-btn" onclick="loadShares()">↻</button>
            </div>
            <div class="sharing-list" id="sharingList">
                <div class="empty-state">
                    <div class="emoji">🤝</div>
                    <div>loading community shares...</div>
                </div>
            </div>
        </div>
        
        <div class="tab-content" id="mapTab">
            <div class="map-container" id="mapContainer"></div>
            <button class="location-btn" onclick="getUserLocation()">📍 find shares near me</button>
        </div>
    </div>
    
    <!-- Consistent consumer bottom nav: home, deals, lists, fridge -->
    <div class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-emoji">🏠</span><span>home</span>
        </a>
        <a href="find-stores.html" class="nav-item">
            <span class="nav-emoji">🔍</span><span>deals</span>
        </a>
        <a href="shoplist.html" class="nav-item">
            <span class="nav-emoji">📝</span><span>lists</span>
        </a>
        <a href="fridge.html" class="nav-item">
            <span class="nav-emoji"><img src="assets/fridge.png" alt="fridge"></span>
            <span>fridge</span>
        </a>
    </div>
</div>

<div class="modal" id="detailModal">
    <div class="modal-content">
        <div class="modal-title" id="modalTitle">🍎 food share</div>
        <div id="modalContent"></div>
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closeDetailModal()">close</button>
            <button class="modal-btn confirm" id="claimBtn" onclick="claimFood()">🤝 claim</button>
        </div>
    </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
</div>

<script src="https://npmcdn.com/parse/dist/parse.min.js"></script>
<script src="backend.js"></script>
<script>
    let map = null;
    let userLocation = null;
    let allShares = [];
    let currentFilter = 'all';
    let currentDetailShare = null;
    let currentUserId = null;
    
    document.addEventListener('DOMContentLoaded', async () => {
        const user = Backend.getCurrentUser();
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        currentUserId = user.id;
        console.log("📱 Current user:", user.get("username"), "ID:", currentUserId);
        
        initMap();
        getUserLocation();
        await loadShares();
        updateNotificationBadge();
    });
    
    function initMap() {
        const container = document.getElementById('mapContainer');
        container.innerHTML = '<div id="leafletMap" style="height: 100%; width: 100%;"></div>';
        map = L.map('leafletMap').setView([1.3521, 103.8198], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);
    }
    
    function getUserLocation() {
        if (!navigator.geolocation) {
            console.log("📍 Geolocation not supported, using default");
            userLocation = { lat: 1.3521, lng: 103.8198 };
            loadShares();
            return;
        }
        
        navigator.geolocation.getCurrentPosition(
            (position) => {
                userLocation = {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude
                };
                console.log("📍 User location:", userLocation);
                
                if (map) {
                    map.eachLayer(layer => {
                        if (layer instanceof L.Marker && layer.getPopup()?.getContent()?.includes('You are here')) {
                            map.removeLayer(layer);
                        }
                    });
                    
                    L.marker([userLocation.lat, userLocation.lng])
                        .addTo(map)
                        .bindPopup('📍 You are here')
                        .openPopup();
                    map.setView([userLocation.lat, userLocation.lng], 13);
                }
                
                loadShares();
            },
            (error) => {
                console.log("📍 Geolocation error, using default");
                userLocation = { lat: 1.3521, lng: 103.8198 };
                loadShares();
            }
        );
    }
    
    async function loadShares() {
        console.log("🔄 Loading community shares...");
        document.getElementById('loadingOverlay').style.display = 'flex';
        
        try {
            const shares = await Backend.getCommunityShares();
            console.log("📦 Raw shares from backend:", shares);
            
            allShares = shares.map(share => {
                let distance = null;
                
                if (userLocation && share.location) {
                    distance = calculateDistance(
                        userLocation.lat,
                        userLocation.lng,
                        share.location.lat,
                        share.location.lng
                    );
                }
                
                return {
                    ...share,
                    distance: distance
                };
            });
            
            // Sort by distance
            allShares.sort((a, b) => {
                if (a.distance === null && b.distance === null) return 0;
                if (a.distance === null) return 1;
                if (b.distance === null) return -1;
                return a.distance - b.distance;
            });
            
            console.log(`✅ Loaded ${allShares.length} shares`);
            updateStats();
            renderShares();
            renderMapMarkers();
            
        } catch (error) {
            console.error("❌ Error loading shares:", error);
            document.getElementById('sharingList').innerHTML = `
                <div class="empty-state">
                    <div class="emoji">⚠️</div>
                    <div>Error loading shares</div>
                    <div style="font-size: 12px; margin-top: 8px;">${error.message || 'Unknown error'}</div>
                    <button style="margin-top: 12px; padding: 8px 16px; background: #ee5a24; color: white; border: none; border-radius: 20px; cursor: pointer; font-family: inherit;" onclick="loadShares()">try again</button>
                </div>`;
        }
        
        document.getElementById('loadingOverlay').style.display = 'none';
    }
    
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }
    
    function filterByDistance(distance) {
        currentFilter = distance;
        
        document.querySelectorAll('.distance-chip').forEach(chip => {
            chip.classList.remove('active');
            if ((distance === 'all' && chip.textContent === 'all') ||
                (chip.textContent.includes(distance + ' km'))) {
                chip.classList.add('active');
            }
        });
        
        renderShares();
    }
    
    function filterShares() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        
        const filtered = allShares.filter(share => {
            const matchesSearch = !searchTerm || 
                share.foodItems.some(item => {
                    const name = typeof item === 'string' ? item : (item.name || '');
                    return name.toLowerCase().includes(searchTerm);
                }) ||
                (share.description && share.description.toLowerCase().includes(searchTerm)) ||
                (share.reason && share.reason.toLowerCase().includes(searchTerm));
            
            const matchesDistance = currentFilter === 'all' || 
                (share.distance !== null && share.distance <= currentFilter);
            
            return matchesSearch && matchesDistance;
        });
        
        renderSharesList(filtered);
    }
    
    function renderShares() {
        let filtered = [...allShares];
        
        if (currentFilter !== 'all') {
            filtered = filtered.filter(share => 
                share.distance !== null && share.distance <= currentFilter
            );
        }
        
        renderSharesList(filtered);
    }
    
    function renderSharesList(shares) {
        const container = document.getElementById('sharingList');
        
        if (shares.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="emoji">🍽️</div>
                    <div>no shares found nearby</div>
                    <div style="font-size: 12px; margin-top: 8px; color: #999;">
                        Be the first to share! Cooked too much? Bought extra groceries? 
                        Someone nearby would love it 🥰
                    </div>
                    <button style="margin-top: 16px; padding: 10px 20px; background: #ee5a24; color: white; border: none; border-radius: 25px; cursor: pointer; font-family: inherit; font-size: 14px;" onclick="window.location.href='community-share.html'">
                        + share food now
                    </button>
                </div>`;
            return;
        }
        
        container.innerHTML = shares.map(share => {
            const distanceText = share.distance !== null ? 
                `${share.distance < 1 ? (share.distance * 1000).toFixed(0) + 'm' : share.distance.toFixed(1) + ' km'} away` : 
                'location unknown';
            
            const timeAgo = getTimeAgo(share.createdAt);
            const isClaimed = share.status === 'claimed';
            const claimedByUser = share.claimedBy?.some(c => c.userId === currentUserId);
            const isOwner = share.sharedBy?.id === currentUserId;
            
            const foodTags = share.foodItems.map(item => {
                const name = typeof item === 'string' ? item : (item.name || 'food');
                const emoji = typeof item === 'object' ? (item.emoji || '🍽️') : '🍽️';
                const quantity = typeof item === 'object' && item.quantity ? ` (${item.quantity})` : '';
                return `<span class="food-tag">
                    <span class="emoji">${emoji}</span>
                    ${escapeHtml(name)}${quantity}
                </span>`;
            }).join('');
            
            const reasonLabels = {
                'cooked_too_much': '🍳 cooked too much',
                'bought_extra': '🛒 bought extra',
                'going_away': '✈️ going away',
                'diet_change': '🥗 diet change',
                'expiring_soon': '⏰ expiring soon',
                'free': '🎁 free to good home',
                'other': '🤷 other'
            };
            
            const reasonText = share.reason ? (reasonLabels[share.reason] || share.reason) : '';
            
            const claimedCount = share.claimedBy?.length || 0;
            
            return `
                <div class="sharing-card" onclick="openDetailModal('${share.id}')">
                    <div class="sharing-header">
                        <div class="sharing-user">
                            <div class="user-avatar-small">
                                ${(share.sharedBy.username || 'A').charAt(0).toUpperCase()}
                            </div>
                            <div class="user-info-small">
                                <h4>${escapeHtml(share.sharedBy.username)} ${isOwner ? '(you)' : ''}</h4>
                                <div class="distance">📍 ${distanceText}</div>
                            </div>
                        </div>
                        <span class="sharing-badge ${isClaimed ? 'badge-claimed' : (share.shareType === 'swap' ? 'badge-swap' : 'badge-free')}">
                            ${isClaimed ? '✅ claimed' : (share.shareType === 'swap' ? '🔄 swap' : '🎁 free')}
                        </span>
                    </div>
                    <div class="sharing-food">${foodTags}</div>
                    ${reasonText ? `<div class="sharing-reason">${reasonText}</div>` : ''}
                    ${share.description ? `<div style="font-size: 13px; color: #666; margin-bottom: 8px;">${escapeHtml(share.description.substring(0, 100))}${share.description.length > 100 ? '...' : ''}</div>` : ''}
                    <div class="sharing-footer">
                        <span class="sharing-time">⏰ ${timeAgo}${claimedCount > 0 ? ` • ${claimedCount} claim(s)` : ''}</span>
                        ${isOwner ? 
                            `<button class="claim-btn" style="background: #999;" disabled>your share</button>` :
                            (!isClaimed && !claimedByUser ? 
                                `<button class="claim-btn" onclick="event.stopPropagation(); openDetailModal('${share.id}')">🤝 claim</button>` :
                                `<button class="claim-btn claimed" disabled>${claimedByUser ? '✓ claimed by you' : 'claimed'}</button>`
                            )
                        }
                    </div>
                </div>`;
        }).join('');
    }
    
    function renderMapMarkers() {
        if (!map) return;
        
        // Clear existing markers (except user location)
        map.eachLayer(layer => {
            if (layer instanceof L.Marker && !layer.getPopup()?.getContent()?.includes('You are here')) {
                map.removeLayer(layer);
            }
        });
        
        // Add share markers
