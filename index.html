<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>foodsave • home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .app {
            width: 100%;
            max-width: 400px;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.03);
            position: relative;
        }
        
        /* Header */
        .header {
            padding: 30px 20px;
            background: linear-gradient(135deg, #34c759, #007aff);
            color: white;
            position: relative;
        }
        
        .greeting {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-avatar {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .user-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            font-size: 12px;
            backdrop-filter: blur(5px);
        }
        
        .verified-badge {
            background: #34c759;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 8px;
        }
        
        .date {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 8px;
        }
        
        .logout-btn {
            position: absolute;
            top: 30px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        
        .logout-btn:active {
            background: rgba(255,255,255,0.3);
        }
        
        /* Content */
        .content {
            padding: 20px;
            padding-bottom: 80px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .view-all {
            color: #007aff;
            font-size: 14px;
            text-decoration: none;
        }
        
        /* CONSUMER SECTION */
        .consumer-only {
            display: none;
        }
        
        body.consumer .consumer-only {
            display: block;
        }
        
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .action-card {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            text-decoration: none;
            color: #1a1a1a;
            transition: 0.2s;
            border: 1px solid #f0f0f0;
        }
        
        .action-card:active {
            transform: scale(0.97);
            background: #f0f2f5;
        }
        
        .card-emoji {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .card-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .card-desc {
            font-size: 12px;
            color: #666;
        }
        
        /* Recent Deals */
        .deals-list {
            margin-bottom: 24px;
        }
        
        .deal-item {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #f0f0f0;
        }
        
        .deal-icon {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .deal-details {
            flex: 1;
        }
        
        .deal-name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .deal-meta {
            font-size: 12px;
            color: #666;
            display: flex;
            gap: 8px;
        }
        
        .deal-discount {
            color: #34c759;
            font-weight: 600;
            font-size: 14px;
        }
        
        /* Fridge Summary */
        .fridge-summary {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
        }
        
        .fridge-stats {
            display: flex;
            justify-content: space-around;
            margin: 16px 0;
        }
        
        .fridge-stat {
            text-align: center;
        }
        
        .stat-number {
            font-size: 24px;
            font-weight: 600;
            color: #007aff;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
        }
        
        /* ADVERTISER SECTION */
        .advertiser-only {
            display: none;
        }
        
        body.advertiser .advertiser-only {
            display: block;
        }
        
        /* Shop Profile Card */
        .profile-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .profile-card:active {
            transform: scale(0.98);
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .profile-avatar {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }
        
        .profile-name {
            flex: 1;
        }
        
        .profile-name h3 {
            font-size: 18px;
            margin-bottom: 4px;
        }
        
        .profile-meta {
            font-size: 13px;
            opacity: 0.9;
        }
        
        .verification-status {
            display: inline-block;
            padding: 4px 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            font-size: 11px;
            margin-top: 4px;
        }
        
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        
        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 12px;
        }
        
        .stat-box .number {
            font-size: 20px;
            font-weight: 600;
        }
        
        .stat-box .label {
            font-size: 11px;
            opacity: 0.8;
        }
        
        /* Shop Actions */
        .shop-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .shop-action {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: #1a1a1a;
            border: 1px solid #f0f0f0;
        }
        
        .shop-action:active {
            background: #f0f2f5;
        }
        
        .action-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        /* Shop Ads */
        .ads-list {
            margin-bottom: 20px;
        }
        
        .ad-item {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            border-left: 4px solid #34c759;
        }
        
        .ad-item.expiring {
            border-left-color: #ff9500;
        }
        
        .ad-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .ad-food {
            font-weight: 600;
        }
        
        .ad-discount {
            color: #34c759;
            font-weight: 600;
        }
        
        .ad-meta {
            font-size: 12px;
            color: #666;
            display: flex;
            gap: 12px;
        }
        
        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-top: 1px solid #f0f0f0;
            padding: 8px 20px;
            display: flex;
            justify-content: space-around;
        }
        
        .nav-item {
            text-decoration: none;
            color: #999;
            font-size: 12px;
            text-align: center;
            flex: 1;
            padding: 4px 0;
        }
        
        .nav-item.active {
            color: #007aff;
        }
        
        .nav-emoji {
            font-size: 20px;
            margin-bottom: 2px;
            display: block;
        }
        
        /* Loading States */
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f0f0f0;
            border-top-color: #007aff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 30px;
            color: #999;
            background: #f8f9fa;
            border-radius: 16px;
        }
        
        .empty-emoji {
            font-size: 40px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <div class="greeting">
                <div class="user-avatar" id="userAvatar" onclick="goToProfile()">👤</div>
                <div class="user-info">
                    <div class="user-name" id="userName">
                        loading...
                        <span class="verified-badge" id="verifiedBadge" style="display: none;">✓ verified</span>
                    </div>
                    <div class="user-badge" id="userBadge">consumer</div>
                </div>
            </div>
            <div class="date" id="currentDate"></div>
            <button class="logout-btn" onclick="logout()">logout</button>
        </div>
        
        <!-- Content -->
        <div class="content">
            <!-- CONSUMER VIEW -->
            <div class="consumer-only">
                <div class="quick-actions">
                    <a href="shoplist.html" class="action-card">
                        <div class="card-emoji">🛒</div>
                        <div class="card-title">my lists</div>
                        <div class="card-desc" id="listCount">0 items</div>
                    </a>
                    <a href="find-stores.html" class="action-card">
                        <div class="card-emoji">🔍</div>
                        <div class="card-title">find deals</div>
                        <div class="card-desc" id="dealsCount">0 nearby</div>
                    </a>
                    <a href="fridge.html" class="action-card">
                        <div class="card-emoji">🧊</div>
                        <div class="card-title">my fridge</div>
                        <div class="card-desc" id="fridgeCount">0 items</div>
                    </a>
                    <a href="#" class="action-card" onclick="comingSoon('recipes')">
                        <div class="card-emoji">🍳</div>
                        <div class="card-title">recipes</div>
                        <div class="card-desc">coming soon</div>
                    </a>
                </div>
                
                <div class="section-title">
                    recent deals
                    <a href="find-stores.html" class="view-all">view all →</a>
                </div>
                <div class="deals-list" id="recentDeals">
                    <!-- Loaded dynamically -->
                </div>
                
                <div class="section-title">
                    fridge summary
                    <a href="fridge.html" class="view-all">view all →</a>
                </div>
                <div class="fridge-summary" id="fridgeSummary">
                    <!-- Loaded dynamically -->
                </div>
            </div>
            
            <!-- ADVERTISER VIEW -->
            <div class="advertiser-only">
                <!-- Shop Profile Card - Clickable to profile -->
                <div class="profile-card" id="shopProfile" onclick="goToProfile()">
                    <!-- Loaded dynamically -->
                </div>
                
                <div class="shop-actions">
                    <a href="advertise.html" class="shop-action">
                        <div class="action-icon">📢</div>
                        <div>post ad</div>
                    </a>
                    <a href="business-profile.html" class="shop-action">
                        <div class="action-icon">⚙️</div>
                        <div>settings</div>
                    </a>
                    <a href="#" class="shop-action" onclick="comingSoon('analytics')">
                        <div class="action-icon">📊</div>
                        <div>analytics</div>
                    </a>
                    <a href="business-profile.html?tab=staff" class="shop-action">
                        <div class="action-icon">👥</div>
                        <div>staff</div>
                    </a>
                </div>
                
                <div class="section-title">
                    your active deals
                    <a href="advertise.html" class="view-all">manage →</a>
                </div>
                <div class="ads-list" id="shopAds">
                    <!-- Loaded dynamically -->
                </div>
            </div>
        </div>
        
        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <a href="#" class="nav-item active">
                <span class="nav-emoji">🏠</span>
                <span>home</span>
            </a>
            <a href="#" class="nav-item" onclick="navigateToRolePage()">
                <span class="nav-emoji" id="navIcon">🛒</span>
                <span id="navLabel">lists</span>
            </a>
            <a href="#" class="nav-item" onclick="goToProfile()">
                <span class="nav-emoji">👤</span>
                <span>profile</span>
            </a>
        </div>
    </div>
    
    <script src="https://npmcdn.com/parse/dist/parse.min.js"></script>
    <script src="backend.js"></script>
    
    <script>
        // ==================== STATE ====================
        let currentRole = 'consumer';
        let currentUser = null;
        let businessRole = 'staff';
        let isVerified = false;
        
        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', async () => {
            // Check login
            const user = Backend.getCurrentUser();
            const role = localStorage.getItem('userRole');
            
            if (!user || !role) {
                window.location.href = 'login.html';
                return;
            }
            
            currentUser = user;
            currentRole = role;
            businessRole = localStorage.getItem('businessRole') || 'staff';
            isVerified = localStorage.getItem('businessVerified') === 'true';
            
            // Set body class
            document.body.className = role;
            
            // Set date
            const date = new Date();
            document.getElementById('currentDate').textContent = 
                date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            
            // Update navigation based on role
            updateNavigation();
            
            // Load data
            await loadUserData();
        });
        
        // ==================== NAVIGATION ====================
        function goToProfile() {
            if (currentRole === 'advertiser') {
                window.location.href = 'business-profile.html';
            } else {
                comingSoon('consumer profile');
            }
        }
        
        function navigateToRolePage() {
            if (currentRole === 'consumer') {
                window.location.href = 'shoplist.html';
            } else {
                window.location.href = 'advertise.html';
            }
        }
        
        function updateNavigation() {
            const navIcon = document.getElementById('navIcon');
            const navLabel = document.getElementById('navLabel');
            
            if (currentRole === 'consumer') {
                navIcon.textContent = '🛒';
                navLabel.textContent = 'lists';
            } else {
                navIcon.textContent = '📢';
                navLabel.textContent = 'post ad';
            }
        }
        
        // ==================== LOAD DATA ====================
        async function loadUserData() {
            const userName = localStorage.getItem('loggedInUser') || 'user';
            document.getElementById('userName').innerHTML = userName;
            
            if (currentRole === 'consumer') {
                await loadConsumerData();
            } else {
                await loadAdvertiserData();
            }
        }
        
        async function loadConsumerData() {
            document.getElementById('userBadge').textContent = 'consumer';
            document.getElementById('verifiedBadge').style.display = 'none';
            
            // Load deals
            const deals = await Backend.getActiveAds({ limit: 3 });
            displayRecentDeals(deals);
            document.getElementById('dealsCount').textContent = deals.length + ' nearby';
            
            // Load fridge items
            const fridge = JSON.parse(localStorage.getItem('foodItems')) || [];
            document.getElementById('fridgeCount').textContent = fridge.length + ' items';
            
            // Display fridge summary
            displayFridgeSummary(fridge);
            
            // Load list count
            const lists = JSON.parse(localStorage.getItem('shoplists')) || {};
            const totalItems = Object.values(lists).reduce((sum, list) => 
                sum + (list.items?.length || 0), 0);
            document.getElementById('listCount').textContent = totalItems + ' items';
        }
        
        async function loadAdvertiserData() {
            const businessName = localStorage.getItem('businessName') || 'your shop';
            const businessDetails = JSON.parse(localStorage.getItem('businessDetails')) || {};
            
            document.getElementById('userBadge').textContent = businessRole;
            if (isVerified) {
                document.getElementById('verifiedBadge').style.display = 'inline-block';
            }
            
            // Load shop profile
            displayShopProfile(businessDetails);
            
            // Load shop ads
            const ads = await Backend.getBusinessAds();
            displayShopAds(ads);
        }
        
        function displayRecentDeals(deals) {
            const container = document.getElementById('recentDeals');
            
            if (!deals || deals.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-emoji">🔍</div>
                        <div>no deals nearby</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = deals.map(deal => `
                <div class="deal-item" onclick="window.location.href='find-stores.html'">
                    <div class="deal-icon">🏷️</div>
                    <div class="deal-details">
                        <div class="deal-name">${deal.foodName}</div>
                        <div class="deal-meta">
                            <span>${deal.businessName || deal.shopName}</span>
                            <span>•</span>
                            <span>${new Date(deal.expiryDate).toLocaleDateString()}</span>
                        </div>
                    </div>
                    <div class="deal-discount">-${deal.discount}%</div>
                </div>
            `).join('');
        }
        
        function displayFridgeSummary(items) {
            const container = document.getElementById('fridgeSummary');
            
            const today = new Date();
            today.setHours(0,0,0,0);
            
            const expiring = items.filter(item => {
                const expiry = new Date(item.expiry);
                const diff = Math.round((expiry - today) / (1000*60*60*24));
                return diff >= 0 && diff <= 3;
            }).length;
            
            const expired = items.filter(item => {
                const expiry = new Date(item.expiry);
                return expiry < today;
            }).length;
            
            container.innerHTML = `
                <div class="fridge-stats">
                    <div class="fridge-stat">
                        <div class="stat-number">${items.length}</div>
                        <div class="stat-label">total</div>
                    </div>
                    <div class="fridge-stat">
                        <div class="stat-number" style="color:#ff9500;">${expiring}</div>
                        <div class="stat-label">expiring</div>
                    </div>
                    <div class="fridge-stat">
                        <div class="stat-number" style="color:#ff3b30;">${expired}</div>
                        <div class="stat-label">expired</div>
                    </div>
                </div>
            `;
        }
        
        function displayShopProfile(details) {
            const container = document.getElementById('shopProfile');
            const roleDisplay = businessRole === 'owner' ? '👑 owner' : 
                              businessRole === 'manager' ? '⭐ manager' : '👤 staff';
            
            container.innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar">🏪</div>
                    <div class="profile-name">
                        <h3>${details.name || 'your shop'}</h3>
                        <div class="profile-meta">${details.address || 'tap to edit profile'}</div>
                        <div class="verification-status">
                            ${isVerified ? '✅ verified' : '⏳ verification pending'}
                        </div>
                    </div>
                </div>
                <div style="margin-bottom: 12px; font-size: 13px; opacity: 0.9;">
                    Role: ${roleDisplay}
                </div>
                <div class="profile-stats" id="profileStats">
                    <div class="stat-box">
                        <div class="number" id="profileViews">0</div>
                        <div class="label">views</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="profileAds">0</div>
                        <div class="label">ads</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="profileClaimed">0</div>
                        <div class="label">claimed</div>
                    </div>
                </div>
            `;
        }
        
        async function displayShopAds(ads) {
            const container = document.getElementById('shopAds');
            const profileAds = document.getElementById('profileAds');
            const profileViews = document.getElementById('profileViews');
            const profileClaimed = document.getElementById('profileClaimed');
            
            if (!ads || ads.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-emoji">📢</div>
                        <div>no active ads</div>
                        <div style="font-size:13px; margin-top:8px;">post your first deal</div>
                    </div>
                `;
                if (profileAds) profileAds.textContent = '0';
                return;
            }
            
            // Update stats
            if (profileAds) profileAds.textContent = ads.length;
            if (profileViews) profileViews.textContent = ads.reduce((sum, ad) => sum + (ad.views || 0), 0);
            if (profileClaimed) profileClaimed.textContent = ads.reduce((sum, ad) => sum + (ad.claimed || 0), 0);
            
            container.innerHTML = ads.slice(0, 5).map(ad => {
                const daysUntil = Math.ceil((new Date(ad.expiryDate) - new Date()) / (1000*60*60*24));
                const expiring = daysUntil <= 2;
                
                return `
                    <div class="ad-item ${expiring ? 'expiring' : ''}">
                        <div class="ad-header">
                            <span class="ad-food">${ad.foodName}</span>
                            <span class="ad-discount">${ad.discount}% off</span>
                        </div>
                        <div class="ad-meta">
                            <span>expires in ${daysUntil} days</span>
                            <span>👁️ ${ad.views || 0}</span>
                            <span>✅ ${ad.claimed || 0}</span>
                        </div>
                    </div>
                `;
            }).join('');
            
            if (ads.length > 5) {
                container.innerHTML += `<a href="advertise.html" style="text-align:center; display:block; margin-top:12px; color:#007aff; text-decoration:none;">view all ${ads.length} ads →</a>`;
            }
        }
        
        // ==================== UTILS ====================
        async function logout() {
            await Backend.logout();
            window.location.href = 'login.html';
        }
        
        function comingSoon(feature) {
            alert(`✨ ${feature} coming soon!`);
        }
        
        // Make functions global
        window.logout = logout;
