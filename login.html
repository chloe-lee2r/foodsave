<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>foodsave • login</title>
    <!-- Set website icon to assets/icon.png (salad image) -->
    <link rel="icon" type="image/png" href="assets/icon.png">
    <link rel="shortcut icon" type="image/png" href="assets/icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #34c759 0%, #007aff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .app {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Header */
        .header {
            background: #f8f9fa;
            padding: 30px 24px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 12px;
            animation: bounce 0.5s ease;
        }
        
        /* Replace emoji with actual image */
        .logo img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            display: inline-block;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .app-name {
            font-size: 28px;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: -0.5px;
        }
        
        .app-name span {
            color: #34c759;
        }
        
        .tagline {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
        }
        
        /* Form Container */
        .form-container {
            padding: 24px;
        }
        
        /* Role Selector */
        .role-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            background: #f8f9fa;
            padding: 8px;
            border-radius: 16px;
        }
        
        .role-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: transparent;
            font-size: 16px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .role-btn.active {
            background: white;
            color: #007aff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transform: scale(1.02);
        }
        
        .role-btn.consumer.active {
            color: #34c759;
        }
        
        .role-btn.shop.active {
            color: #007aff;
        }
        
        /* Form Sections */
        .form-section {
            transition: all 0.3s ease;
        }
        
        .form-section.hidden {
            display: none;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-title span {
            background: #007aff;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        .input-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 6px;
            display: block;
            font-weight: 500;
        }
        
        .input-field {
            width: 100%;
            padding: 14px;
            border: 2px solid #f0f0f0;
            border-radius: 16px;
            font-size: 16px;
            background: #fafafa;
            transition: all 0.2s;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #007aff;
            background: white;
            box-shadow: 0 4px 12px rgba(0,122,255,0.1);
        }
        
        .input-field.consumer:focus {
            border-color: #34c759;
        }
        
        /* Shop Details Grid */
        .shop-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        /* Action Buttons */
        .action-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .login-btn {
            background: #007aff;
            color: white;
        }
        
        .login-btn:active {
            background: #005bbf;
            transform: scale(0.98);
        }
        
        .register-btn {
            background: #34c759;
            color: white;
        }
        
        .register-btn:active {
            background: #2db14e;
            transform: scale(0.98);
        }
        
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: #999;
            font-size: 14px;
        }
        
        .divider-line {
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, transparent, #f0f0f0, transparent);
        }
        
        /* Back Link */
        .back-link {
            display: block;
            text-align: center;
            text-decoration: none;
            color: #666;
            font-size: 14px;
            padding: 12px;
            transition: 0.2s;
        }
        
        .back-link:hover {
            color: #007aff;
        }
        
        /* Status Messages */
        .status-message {
            padding: 14px;
            border-radius: 16px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .status-message.error {
            display: block;
            background: #ffebee;
            color: #ff3b30;
            border: 1px solid #ffcdd2;
        }
        
        .status-message.success {
            display: block;
            background: #e8f5e8;
            color: #34c759;
            border: 1px solid #c8e6c9;
        }
        
        .status-message.info {
            display: block;
            background: #e3f2fd;
            color: #007aff;
            border: 1px solid #bbdefb;
        }
        
        /* Loading Spinner */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Password Strength */
        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s;
        }
        
        .strength-bar.weak {
            width: 33%;
            background: #ff3b30;
        }
        
        .strength-bar.medium {
            width: 66%;
            background: #ff9500;
        }
        
        .strength-bar.strong {
            width: 100%;
            background: #34c759;
        }
        
        /* Responsive */
        @media (max-width: 380px) {
            .shop-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo">
                <img src="assets/icon.png" alt="salad icon">
            </div>
            <div class="app-name">food<span>save</span></div>
            <div class="tagline">save food • save money • save planet</div>
        </div>
        
        <div class="form-container">
            <!-- Status Messages -->
            <div id="statusMessage" class="status-message"></div>
            
            <!-- Role Selector -->
            <div class="role-selector" id="roleSelector">
                <button class="role-btn consumer active" onclick="setRole('consumer')">
                    👤 consumer
                </button>
                <button class="role-btn shop" onclick="setRole('advertiser')">
                    🏪 shop owner
                </button>
            </div>
            
            <!-- CONSUMER FORM -->
            <div id="consumerForm" class="form-section">
                <div class="input-group">
                    <label class="input-label">username</label>
                    <input type="text" class="input-field consumer" id="consumerUsername" placeholder="choose a username" autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label class="input-label">password</label>
                    <input type="password" class="input-field consumer" id="consumerPassword" placeholder="••••••••">
                    <div class="password-strength" id="consumerStrength">
                        <div class="strength-bar"></div>
                    </div>
                </div>
                
                <button class="action-btn login-btn" onclick="handleConsumerLogin()" id="consumerLoginBtn">
                    log in as consumer
                </button>
                
                <button class="action-btn register-btn" onclick="handleConsumerRegister()" id="consumerRegisterBtn">
                    create consumer account
                </button>
            </div>
            
            <!-- SHOP OWNER FORM -->
            <div id="shopForm" class="form-section hidden">
                <!-- Login Section -->
                <div class="section-title">
                    <span>🔐</span> login to existing shop
                </div>
                
                <div class="input-group">
                    <label class="input-label">username</label>
                    <input type="text" class="input-field" id="shopLoginUsername" placeholder="your shop username">
                </div>
                
                <div class="input-group">
                    <label class="input-label">password</label>
                    <input type="password" class="input-field" id="shopLoginPassword" placeholder="••••••••">
                </div>
                
                <button class="action-btn login-btn" onclick="handleShopLogin()" id="shopLoginBtn">
                    log in as shop
                </button>
                
                <div class="divider">
                    <span class="divider-line"></span>
                    <span>new shop?</span>
                    <span class="divider-line"></span>
                </div>
                
                <!-- Registration Section -->
                <div class="section-title">
                    <span>🏪</span> register new shop
                </div>
                
                <div class="input-group">
                    <label class="input-label">business name</label>
                    <input type="text" class="input-field" id="shopName" placeholder="e.g., Whole Foods Market">
                </div>
                
                <div class="shop-grid">
                    <div class="input-group">
                        <label class="input-label">phone</label>
                        <input type="tel" class="input-field" id="shopPhone" placeholder="(555) 123-4567">
                    </div>
                    
                    <div class="input-group">
                        <label class="input-label">email</label>
                        <input type="email" class="input-field" id="shopEmail" placeholder="shop@example.com">
                    </div>
                </div>
                
                <div class="input-group">
                    <label class="input-label">address</label>
                    <input type="text" class="input-field" id="shopAddress" placeholder="123 Main St, City, State">
                </div>
                
                <div class="shop-grid">
                    <div class="input-group">
                        <label class="input-label">latitude</label>
                        <input type="text" class="input-field" id="shopLat" placeholder="40.7128">
                    </div>
                    
                    <div class="input-group">
                        <label class="input-label">longitude</label>
                        <input type="text" class="input-field" id="shopLng" placeholder="-74.0060">
                    </div>
                </div>
                
                <div class="input-group">
                    <label class="input-label">username for login</label>
                    <input type="text" class="input-field" id="shopUsername" placeholder="choose a username">
                </div>
                
                <div class="input-group">
                    <label class="input-label">password</label>
                    <input type="password" class="input-field" id="shopPassword" placeholder="••••••••" onkeyup="checkPasswordStrength(this.value, 'shop')">
                    <div class="password-strength" id="shopStrength">
                        <div class="strength-bar"></div>
                    </div>
                </div>
                
                <div class="shop-grid">
                    <div class="input-group">
                        <label class="input-label">open time</label>
                        <input type="time" class="input-field" id="shopOpen" value="09:00">
                    </div>
                    
                    <div class="input-group">
                        <label class="input-label">close time</label>
                        <input type="time" class="input-field" id="shopClose" value="21:00">
                    </div>
                </div>
                
                <button class="action-btn register-btn" onclick="handleShopRegister()" id="shopRegisterBtn">
                    register new shop
                </button>
            </div>
            
            <div class="divider">
                <span class="divider-line"></span>
                <span>or</span>
                <span class="divider-line"></span>
            </div>
            
            <a href="index.html" class="back-link">← back to home</a>
        </div>
    </div>
    
    <script src="https://npmcdn.com/parse/dist/parse.min.js"></script>
    <script src="backend.js"></script>
    
    <script>
        // ==================== STATE ====================
        let currentRole = 'consumer';
        
        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', () => {
            // Check if already logged in
            const user = Backend.getCurrentUser();
            if (user) {
                const role = localStorage.getItem('userRole');
                if (role) {
                    window.location.href = 'index.html';
                }
            }
            
            // Set default dates
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            
            // Pre-fill with demo data for testing
            document.getElementById('shopName').value = "Demo Market";
            document.getElementById('shopPhone').value = "555-0123";
            document.getElementById('shopEmail').value = "demo@market.com";
            document.getElementById('shopAddress').value = "123 Main St";
            document.getElementById('shopLat').value = "40.7128";
            document.getElementById('shopLng').value = "-74.0060";
            document.getElementById('shopUsername').value = "demo_shop";
        });
        
        // ==================== ROLE HANDLING ====================
        function setRole(role) {
            currentRole = role;
            
            // Update UI
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            if (role === 'consumer') {
                document.querySelector('.role-btn.consumer').classList.add('active');
                document.getElementById('consumerForm').classList.remove('hidden');
                document.getElementById('shopForm').classList.add('hidden');
            } else {
                document.querySelector('.role-btn.shop').classList.add('active');
                document.getElementById('shopForm').classList.remove('hidden');
                document.getElementById('consumerForm').classList.add('hidden');
            }
        }
        
        // ==================== PASSWORD STRENGTH ====================
        function checkPasswordStrength(password, type) {
            const strengthBar = document.querySelector(`#${type}Strength .strength-bar`);
            let strength = 0;
            
            if (password.length >= 6) strength += 1;
            if (password.length >= 8) strength += 1;
            if (/[A-Z]/.test(password)) strength += 1;
            if (/[0-9]/.test(password)) strength += 1;
            if (/[^A-Za-z0-9]/.test(password)) strength += 1;
            
            strengthBar.className = 'strength-bar';
            
            if (password.length === 0) {
                strengthBar.style.width = '0';
            } else if (strength <= 2) {
                strengthBar.classList.add('weak');
            } else if (strength <= 4) {
                strengthBar.classList.add('medium');
            } else {
                strengthBar.classList.add('strong');
            }
        }
        
        // ==================== CONSUMER ACTIONS ====================
        async function handleConsumerLogin() {
            const username = document.getElementById('consumerUsername').value.trim();
            const password = document.getElementById('consumerPassword').value;
            
            if (!username || !password) {
                showStatus('please enter username and password', 'error');
                return;
            }
            
            setButtonsDisabled(true, 'consumer');
            showStatus('logging in...', 'info');
            
            const result = await Backend.login(username, password, 'consumer');
            
            if (result.success) {
                showStatus('login successful!', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                showStatus(result.message || 'login failed', 'error');
                setButtonsDisabled(false, 'consumer');
            }
        }
        
        async function handleConsumerRegister() {
            const username = document.getElementById('consumerUsername').value.trim();
            const password = document.getElementById('consumerPassword').value;
            
            if (!username || !password) {
                showStatus('please enter username and password', 'error');
                return;
            }
            
            if (password.length < 6) {
                showStatus('password must be at least 6 characters', 'error');
                return;
            }
            
            setButtonsDisabled(true, 'consumer');
            showStatus('creating account...', 'info');
            
            const result = await Backend.register(username, password, 'consumer');
            
            if (result.success) {
                showStatus('account created! logging in...', 'success');
                setTimeout(async () => {
                    const loginResult = await Backend.login(username, password, 'consumer');
                    if (loginResult.success) {
                        window.location.href = 'index.html';
                    }
                }, 1000);
            } else {
                showStatus(result.message || 'registration failed', 'error');
                setButtonsDisabled(false, 'consumer');
            }
        }
        
        // ==================== SHOP OWNER ACTIONS ====================
        async function handleShopLogin() {
            const username = document.getElementById('shopLoginUsername').value.trim();
            const password = document.getElementById('shopLoginPassword').value;
            
            if (!username || !password) {
                showStatus('please enter username and password', 'error');
                return;
            }
            
            setButtonsDisabled(true, 'shop');
            showStatus('logging in...', 'info');
            
            const result = await Backend.login(username, password, 'advertiser');
            
            if (result.success) {
                showStatus('login successful!', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                showStatus(result.message || 'login failed', 'error');
                setButtonsDisabled(false, 'shop');
            }
        }
        
        async function handleShopRegister() {
            const username = document.getElementById('shopUsername').value.trim();
            const password = document.getElementById('shopPassword').value;
            
            // Validate required fields
            if (!username || !password) {
                showStatus('please enter username and password', 'error');
                return;
            }
            
            if (password.length < 6) {
                showStatus('password must be at least 6 characters', 'error');
                return;
            }
            
            // Collect shop details
            const businessDetails = {
                name: document.getElementById('shopName').value.trim() || username,
                phone: document.getElementById('shopPhone').value.trim(),
                email: document.getElementById('shopEmail').value.trim(),
                address: document.getElementById('shopAddress').value.trim(),
                latitude: document.getElementById('shopLat').value.trim(),
                longitude: document.getElementById('shopLng').value.trim(),
                openTime: document.getElementById('shopOpen').value,
                closeTime: document.getElementById('shopClose').value,
                type: 'grocery'
            };
            
            setButtonsDisabled(true, 'shop');
            showStatus('creating shop account...', 'info');
            
            // Register with business details
            const result = await Backend.register(username, password, 'advertiser', businessDetails);
            
            if (result.success) {
                showStatus('shop registered! logging in...', 'success');
                setTimeout(async () => {
                    const loginResult = await Backend.login(username, password, 'advertiser');
                    if (loginResult.success) {
                        window.location.href = 'index.html';
                    }
                }, 1000);
            } else {
                showStatus(result.message || 'registration failed', 'error');
                setButtonsDisabled(false, 'shop');
            }
        }
        
        // ==================== UTILITY FUNCTIONS ====================
        function setButtonsDisabled(disabled, type) {
            if (type === 'consumer') {
                document.getElementById('consumerLoginBtn').disabled = disabled;
                document.getElementById('consumerRegisterBtn').disabled = disabled;
            } else {
                document.getElementById('shopLoginBtn').disabled = disabled;
                document.getElementById('shopRegisterBtn').disabled = disabled;
            }
        }
        
        function showStatus(message, type = 'info') {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = `status-message ${type}`;
        }
        
        // Enter key handlers
        document.getElementById('consumerPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleConsumerLogin();
        });
        
        document.getElementById('shopLoginPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleShopLogin();
        });
        
        document.getElementById('shopPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleShopRegister();
        });
        
        // Make functions global
        window.setRole = setRole;
        window.handleConsumerLogin = handleConsumerLogin;
        window.handleConsumerRegister = handleConsumerRegister;
        window.handleShopLogin = handleShopLogin;
        window.handleShopRegister = handleShopRegister;
        window.checkPasswordStrength = checkPasswordStrength;
    </script>
</body>
</html>
