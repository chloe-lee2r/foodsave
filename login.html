<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>foodsave • login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #34c759 0%, #007aff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .app {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        /* Header */
        .header {
            background: #f8f9fa;
            padding: 30px 24px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 12px;
        }
        
        .app-name {
            font-size: 28px;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: -0.5px;
        }
        
        .app-name span {
            color: #34c759;
        }
        
        .tagline {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
        }
        
        /* Form */
        .form-container {
            padding: 24px;
        }
        
        .role-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            background: #f8f9fa;
            padding: 8px;
            border-radius: 16px;
        }
        
        .role-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: transparent;
            font-size: 16px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .role-btn.active {
            background: white;
            color: #007aff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .role-btn.consumer.active {
            color: #34c759;
        }
        
        .role-btn.shop.active {
            color: #007aff;
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        .input-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 6px;
            display: block;
        }
        
        .input-field {
            width: 100%;
            padding: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            font-size: 16px;
            background: #fafafa;
            transition: 0.2s;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #007aff;
            background: white;
        }
        
        .input-field.consumer:focus {
            border-color: #34c759;
        }
        
        .input-field.shop:focus {
            border-color: #007aff;
        }
        
        .password-hint {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
            margin-left: 4px;
        }
        
        .action-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 12px;
        }
        
        .login-btn {
            background: #007aff;
            color: white;
        }
        
        .login-btn:active {
            background: #005bbf;
            transform: scale(0.98);
        }
        
        .register-btn {
            background: #34c759;
            color: white;
        }
        
        .register-btn:active {
            background: #2db14e;
            transform: scale(0.98);
        }
        
        .login-btn:disabled, .register-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: #999;
            font-size: 14px;
        }
        
        .divider-line {
            flex: 1;
            height: 1px;
            background: #f0f0f0;
        }
        
        .back-link {
            display: block;
            text-align: center;
            text-decoration: none;
            color: #666;
            font-size: 14px;
            padding: 12px;
        }
        
        .back-link:hover {
            color: #007aff;
        }
        
        /* Status Messages */
        .status-message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }
        
        .status-message.error {
            display: block;
            background: #ffebee;
            color: #ff3b30;
            border: 1px solid #ffcdd2;
        }
        
        .status-message.success {
            display: block;
            background: #e8f5e8;
            color: #34c759;
            border: 1px solid #c8e6c9;
        }
        
        .status-message.info {
            display: block;
            background: #e3f2fd;
            color: #007aff;
            border: 1px solid #bbdefb;
        }
        
        /* Loading */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Demo notice */
        .demo-notice {
            background: #fff3e0;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 12px;
            color: #e65100;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo">🥗</div>
            <div class="app-name">food<span>save</span></div>
            <div class="tagline">save food • save money • save planet</div>
        </div>
        
        <div class="form-container">
            <!-- Status Messages -->
            <div id="statusMessage" class="status-message"></div>
            
            <!-- Demo Notice (remove in production) -->
            <div class="demo-notice">
                🔧 demo: use any username, password min 6 chars
            </div>
            
            <!-- Role Selector -->
            <div class="role-selector" id="roleSelector">
                <button class="role-btn consumer active" onclick="setRole('consumer')">
                    👤 consumer
                </button>
                <button class="role-btn shop" onclick="setRole('advertiser')">
                    🏪 shop owner
                </button>
            </div>
            
            <!-- Login Form -->
            <div class="input-group">
                <label class="input-label">username</label>
                <input type="text" class="input-field" id="username" placeholder="enter username" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label class="input-label">password</label>
                <input type="password" class="input-field" id="password" placeholder="••••••••">
                <div class="password-hint">minimum 6 characters</div>
            </div>
            
            <button class="action-btn login-btn" id="loginBtn" onclick="handleLogin()">
                log in
            </button>
            
            <button class="action-btn register-btn" id="registerBtn" onclick="handleRegister()">
                create account
            </button>
            
            <div class="divider">
                <span class="divider-line"></span>
                <span>or</span>
                <span class="divider-line"></span>
            </div>
            
            <a href="index.html" class="back-link">← back to home</a>
        </div>
    </div>
    
    <script src="https://npmcdn.com/parse/dist/parse.min.js"></script>
    <script src="backend.js"></script>
    
    <script>
        // ==================== STATE ====================
        let currentRole = 'consumer';
        
        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', () => {
            // Check if already logged in
            const user = Backend.getCurrentUser();
            if (user) {
                const role = localStorage.getItem('userRole');
                redirectToHome(role);
            }
            
            // Test connection on load
            testConnection();
        });
        
        // ==================== ROLE HANDLING ====================
        function setRole(role) {
            currentRole = role;
            
            // Update UI
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            if (role === 'consumer') {
                document.querySelector('.role-btn.consumer').classList.add('active');
                document.querySelector('.login-btn').style.background = '#34c759';
                document.querySelector('.register-btn').style.background = '#34c759';
            } else {
                document.querySelector('.role-btn.shop').classList.add('active');
                document.querySelector('.login-btn').style.background = '#007aff';
                document.querySelector('.register-btn').style.background = '#007aff';
            }
        }
        
        // ==================== AUTH ACTIONS ====================
        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            // Validate
            if (!username || !password) {
                showStatus('please enter username and password', 'error');
                return;
            }
            
            // Disable buttons
            setButtonsDisabled(true);
            showStatus('logging in...', 'info');
            
            // Attempt login
            const result = await Backend.login(username, password, currentRole);
            
            if (result.success) {
                showStatus('login successful! redirecting...', 'success');
                setTimeout(() => redirectToHome(currentRole), 1000);
            } else {
                showStatus(result.message || 'login failed', 'error');
                setButtonsDisabled(false);
            }
        }
        
        async function handleRegister() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            // Validate
            if (!username || !password) {
                showStatus('please enter username and password', 'error');
                return;
            }
            
            if (password.length < 6) {
                showStatus('password must be at least 6 characters', 'error');
                return;
            }
            
            // Disable buttons
            setButtonsDisabled(true);
            showStatus('creating account...', 'info');
            
            // Attempt registration
            const result = await Backend.register(username, password, currentRole);
            
            if (result.success) {
                showStatus('account created! logging in...', 'success');
                // Auto login after registration
                setTimeout(async () => {
                    const loginResult = await Backend.login(username, password, currentRole);
                    if (loginResult.success) {
                        redirectToHome(currentRole);
                    }
                }, 1000);
            } else {
                showStatus(result.message || 'registration failed', 'error');
                setButtonsDisabled(false);
            }
        }
        
        // ==================== UTILITY FUNCTIONS ====================
        function setButtonsDisabled(disabled) {
            document.getElementById('loginBtn').disabled = disabled;
            document.getElementById('registerBtn').disabled = disabled;
        }
        
        function showStatus(message, type = 'info') {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = `status-message ${type}`;
        }
        
        function redirectToHome(role) {
            if (role === 'advertiser') {
                window.location.href = 'index.html'; // index handles both roles
            } else {
                window.location.href = 'index.html';
            }
        }
        
        async function testConnection() {
            try {
                const result = await Backend.testConnection();
                if (result.success) {
                    console.log('✅ connected to foodsave cloud');
                } else {
                    console.warn('⚠️ using offline mode');
                }
            } catch (error) {
                console.warn('⚠️ offline mode -', error.message);
            }
        }
        
        // Allow enter key to submit
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
        
        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('password').focus();
            }
        });
        
        // Make functions global
        window.setRole = setRole;
        window.handleLogin = handleLogin;
        window.handleRegister = handleRegister;
    </script>
</body>
</html>
