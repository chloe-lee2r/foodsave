<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>foodsavvi • share food</title>
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icon.png">
    <link rel="icon" type="image/png" href="assets/icon.png">
    <link rel="shortcut icon" type="image/png" href="assets/icon.png">
    <meta name="theme-color" content="#ee5a24">
    <style>
        @font-face {
            font-family: 'RusticStory';
            src: url('./assets/RusticStory-R9vKM.ttf') format('truetype'),
                 url('./assets/RusticStory-1jDPL.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'RusticStory', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .app {
            width: 100%;
            max-width: 400px;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.03);
            position: relative;
            padding-bottom: 20px;
        }
        
        .header {
            padding: 30px 20px 20px;
            background: linear-gradient(135deg, #FF6B6B, #ee5a24);
            color: white;
            position: relative;
        }
        
        .back-btn {
            position: absolute;
            top: 30px;
            left: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
        }
        
        .header h1 { font-size: 24px; margin-left: 60px; margin-bottom: 4px; }
        .header-subtitle { font-size: 14px; opacity: 0.9; margin-left: 60px; }
        
        .content { padding: 20px; }
        
        .form-group { margin-bottom: 20px; }
        .form-label { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 8px; display: block; }
        
        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .form-input:focus, .form-textarea:focus, .form-select:focus {
            border-color: #ee5a24;
        }
        
        .form-textarea { min-height: 100px; resize: vertical; }
        
        /* Reason selector */
        .reason-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        
        .reason-option {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            font-size: 13px;
            background: white;
        }
        
        .reason-option:active { transform: scale(0.97); }
        .reason-option.active {
            border-color: #ee5a24;
            background: #fff5f2;
        }
        
        .reason-emoji { font-size: 24px; display: block; margin-bottom: 4px; }
        .reason-text { font-size: 12px; color: #666; }
        .reason-option.active .reason-text { color: #ee5a24; }
        
        /* Food Items */
        .food-items-container { margin-bottom: 12px; }
        
        .food-item-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }
        
        .food-item-row .form-input { flex: 1; }
        
        .remove-btn {
            background: #ff3b30;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 18px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
        }
        
        .add-food-btn {
            background: #f0f0f0;
            border: 2px dashed #ccc;
            color: #666;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: 0.2s;
        }
        
        .add-food-btn:hover { background: #e8e8e8; }
        
        /* Location */
        .location-picker { display: flex; gap: 8px; }
        .location-picker .form-input { flex: 1; }
        
        .locate-btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            white-space: nowrap;
        }
        
        .map-preview {
            width: 100%;
            height: 100px;
            background: #f0f0f0;
            border-radius: 12px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
        }
        
        .map-preview.set { background: #e8f5e8; color: #34c759; }
        
        /* Submit Button */
        .submit-btn {
            background: #ee5a24;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 15px rgba(238, 90, 36, 0.3);
            margin-top: 12px;
        }
        
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }
        
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); display: flex; align-items: center;
            justify-content: center; z-index: 2000; display: none;
        }
        
        .loading-spinner {
            width: 50px; height: 50px; border: 4px solid white;
            border-top-color: #ee5a24; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .tips-box {
            background: #fffbf0;
            border: 1px solid #ffd700;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .tips-box h4 { font-size: 14px; margin-bottom: 8px; color: #ff9500; }
        .tips-box p { font-size: 12px; color: #666; line-height: 1.5; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <button class="back-btn" onclick="window.location.href='community.html'">← back</button>
        <h1>📦 Share Food</h1>
        <div class="header-subtitle">help reduce food waste 🥰</div>
    </div>
    
    <div class="content">
        <div class="tips-box">
            <h4>💡 Sharing tips</h4>
            <p>Be clear about what you're sharing! Include quantities, any dietary info, and when it needs to be eaten. A photo helps too!</p>
        </div>
        
        <form id="shareForm" onsubmit="submitShare(event)">
            <!-- Why sharing -->
            <div class="form-group">
                <label class="form-label">Why are you sharing?</label>
                <div class="reason-grid">
                    <button type="button" class="reason-option active" onclick="selectReason('cooked_too_much')" data-reason="cooked_too_much">
                        <span class="reason-emoji">🍳</span>
                        <span class="reason-text">cooked too much</span>
                    </button>
                    <button type="button" class="reason-option" onclick="selectReason('bought_extra')" data-reason="bought_extra">
                        <span class="reason-emoji">🛒</span>
                        <span class="reason-text">bought extra</span>
                    </button>
                    <button type="button" class="reason-option" onclick="selectReason('going_away')" data-reason="going_away">
                        <span class="reason-emoji">✈️</span>
                        <span class="reason-text">going away</span>
                    </button>
                    <button type="button" class="reason-option" onclick="selectReason('expiring_soon')" data-reason="expiring_soon">
                        <span class="reason-emoji">⏰</span>
                        <span class="reason-text">expiring soon</span>
                    </button>
                    <button type="button" class="reason-option" onclick="selectReason('diet_change')" data-reason="diet_change">
                        <span class="reason-emoji">🥗</span>
                        <span class="reason-text">diet change</span>
                    </button>
                    <button type="button" class="reason-option" onclick="selectReason('other')" data-reason="other">
                        <span class="reason-emoji">🤷</span>
                        <span class="reason-text">other</span>
                    </button>
                </div>
            </div>
            
            <!-- Share Type -->
            <div class="form-group">
                <label class="form-label">Giveaway or swap?</label>
                <div style="display: flex; gap: 12px;">
                    <button type="button" class="reason-option active" onclick="selectShareType('giveaway')" id="giveawayBtn" style="flex: 1;">
                        <span class="reason-emoji">🎁</span>
                        <span class="reason-text">free giveaway</span>
                    </button>
                    <button type="button" class="reason-option" onclick="selectShareType('swap')" id="swapBtn" style="flex: 1;">
                        <span class="reason-emoji">🔄</span>
                        <span class="reason-text">happy to swap</span>
                    </button>
                </div>
            </div>
            
            <!-- Food Items -->
            <div class="form-group">
                <label class="form-label">What food are you sharing?</label>
                <div class="food-items-container" id="foodItemsContainer">
                    <div class="food-item-row">
                        <input type="text" class="form-input" placeholder="e.g., 🍝 pasta with sauce (2 servings)" name="foodItem">
                        <button type="button" class="remove-btn" onclick="removeFoodItem(this)" style="visibility: hidden;">−</button>
                    </div>
                </div>
                <button type="button" class="add-food-btn" onclick="addFoodItem()">+ add another item</button>
            </div>
            
            <!-- Description -->
            <div class="form-group">
                <label class="form-label">Description (optional)</label>
                <textarea class="form-textarea" id="description" placeholder="Tell neighbours about the food - when it was made, ingredients, dietary info, etc."></textarea>
            </div>
            
            <!-- Pickup Location -->
            <div class="form-group">
                <label class="form-label">Pickup location</label>
                <div class="location-picker">
                    <input type="text" class="form-input" id="locationAddress" placeholder="Tap locate button →" readonly>
                    <button type="button" class="locate-btn" onclick="getCurrentLocation()">📍 locate</button>
                </div>
                <div class="map-preview" id="mapPreview">📍 tap 'locate' to set your pickup location</div>
            </div>
            
            <!-- Pickup Instructions -->
            <div class="form-group">
                <label class="form-label">Pickup instructions (optional)</label>
                <textarea class="form-textarea" id="pickupInstructions" placeholder="e.g., leave at door, text when arriving, available after 6pm, etc."></textarea>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">🤝 share with neighbours</button>
        </form>
    </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
</div>

<script src="https://npmcdn.com/parse/dist/parse.min.js"></script>
<script src="backend.js"></script>
<script>
    let shareReason = 'cooked_too_much';
    let shareType = 'giveaway';
    let userLocation = null;
    
    document.addEventListener('DOMContentLoaded', () => {
        const user = Backend.getCurrentUser();
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        console.log("📱 Sharing as:", user.get("username"));
        
        // Try to get user's current location
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    
                    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${userLocation.lat}&lon=${userLocation.lng}`)
                        .then(r => r.json())
                        .then(data => {
                            document.getElementById('locationAddress').value = data.display_name || `${userLocation.lat.toFixed(4)}, ${userLocation.lng.toFixed(4)}`;
                        })
                        .catch(() => {
                            document.getElementById('locationAddress').value = `${userLocation.lat.toFixed(4)}, ${userLocation.lng.toFixed(4)}`;
                        });
                    
                    document.getElementById('mapPreview').innerHTML = '✅ Location set! Neighbours can see where to pick up';
                    document.getElementById('mapPreview').classList.add('set');
                },
                (error) => {
                    console.log('Could not get location:', error);
                }
            );
        }
    });
    
    function selectReason(reason) {
        shareReason = reason;
        document.querySelectorAll('.reason-grid .reason-option').forEach(el => {
            el.classList.remove('active');
            if (el.dataset.reason === reason) el.classList.add('active');
        });
    }
    
    function selectShareType(type) {
        shareType = type;
        document.getElementById('giveawayBtn').classList.toggle('active', type === 'giveaway');
        document.getElementById('swapBtn').classList.toggle('active', type === 'swap');
    }
    
    function addFoodItem() {
        const container = document.getElementById('foodItemsContainer');
        const row = document.createElement('div');
        row.className = 'food-item-row';
        row.innerHTML = `
            <input type="text" class="form-input" placeholder="e.g., 🥖 bread (half loaf)" name="foodItem">
            <button type="button" class="remove-btn" onclick="removeFoodItem(this)">−</button>
        `;
        container.appendChild(row);
    }
    
    function removeFoodItem(btn) {
        const container = document.getElementById('foodItemsContainer');
        if (container.children.length > 1) {
            btn.parentElement.remove();
        }
    }
    
    function getCurrentLocation() {
        if (!navigator.geolocation) {
            alert('Geolocation not supported on your device');
            return;
        }
        
        document.getElementById('mapPreview').innerHTML = '📍 getting location...';
        
        navigator.geolocation.getCurrentPosition(
            (position) => {
                userLocation = {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude
                };
                
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${userLocation.lat}&lon=${userLocation.lng}`)
                    .then(r => r.json())
                    .then(data => {
                        document.getElementById('locationAddress').value = data.display_name || 'Location found';
                    })
                    .catch(() => {
                        document.getElementById('locationAddress').value = `${userLocation.lat.toFixed(4)}, ${userLocation.lng.toFixed(4)}`;
                    });
                
                document.getElementById('mapPreview').innerHTML = '✅ Location set! Neighbours can see where to pick up';
                document.getElementById('mapPreview').classList.add('set');
            },
            (error) => {
                alert('Could not get location. Please enable location services and try again.');
                document.getElementById('mapPreview').innerHTML = '📍 tap locate to set your pickup location';
                document.getElementById('mapPreview').classList.remove('set');
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    }
    
    async function submitShare(event) {
        event.preventDefault();
        
        // Validate food items
        const foodItemInputs = document.querySelectorAll('input[name="foodItem"]');
        const foodItems = [];
        
        foodItemInputs.forEach(input => {
            const value = input.value.trim();
            if (value) {
                const emojiMatch = value.match(/^([\u{1F300}-\u{1F9FF}\u{1F600}-\u{1F64F}\u{1F680}-\u{1F6FF}\u{1F900}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]\u{FE0F}?\s*)/u);
                foodItems.push({
                    name: value,
                    emoji: emojiMatch ? emojiMatch[1].trim() : '🍽️',
                    quantity: 1
                });
            }
        });
        
        if (foodItems.length === 0) {
            alert('Please add at least one food item to share');
            return;
        }
        
        if (!userLocation) {
            alert('Please set a pickup location using the locate button');
            return;
        }
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = '⏳ sharing...';
        document.getElementById('loadingOverlay').style.display = 'flex';
        
        try {
            const shareData = {
                foodItems: foodItems,
                description: document.getElementById('description').value.trim(),
                reason: shareReason,
                shareType: shareType,
                location: {
                    lat: userLocation.lat,
                    lng: userLocation.lng,
                    address: document.getElementById('locationAddress').value
                },
                pickupInstructions: document.getElementById('pickupInstructions').value.trim()
            };
            
            console.log("📤 Creating share:", shareData);
            
            const result = await Backend.createCommunityShare(shareData);
            
            if (result.success) {
                alert('🎉 Food shared with the community! Neighbours nearby can now see it and claim it.');
                window.location.href = 'community.html';
            } else {
                alert(result.message || 'Failed to share food. Please try again.');
            }
            
        } catch (error) {
            console.error('Error sharing food:', error);
            alert('Failed to share food: ' + (error.message || 'Unknown error'));
        }
        
        submitBtn.disabled = false;
        submitBtn.textContent = '🤝 share with neighbours';
        document.getElementById('loadingOverlay').style.display = 'none';
    }
    
    window.selectReason = selectReason;
    window.selectShareType = selectShareType;
    window.addFoodItem = addFoodItem;
    window.removeFoodItem = removeFoodItem;
    window.getCurrentLocation = getCurrentLocation;
</script>
</body>
</html>
