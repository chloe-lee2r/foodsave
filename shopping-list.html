<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>shoplist</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .app {
            width: 100%;
            max-width: 400px;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.03);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .header {
            padding: 20px 16px;
            background: white;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .home-link {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #007aff;
            font-size: 20px;
            font-weight: 500;
            transition: 0.2s;
        }
        
        .home-link:active {
            background: #e8ecf0;
            transform: scale(0.95);
        }
        
        .header h1 {
            flex: 1;
            font-size: 22px;
            font-weight: 600;
            color: #000;
        }
        
        .gps-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #f5f7fa;
            border: none;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .gps-btn.active {
            background: #007aff;
            color: white;
        }
        
        .gps-btn:active {
            transform: scale(0.95);
        }
        
        /* Main Content */
        .content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }
        
        /* List Selector */
        .list-selector {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0 12px;
            margin-bottom: 8px;
            scrollbar-width: none;
        }
        
        .list-selector::-webkit-scrollbar {
            display: none;
        }
        
        .list-tab {
            padding: 8px 16px;
            background: #f5f7fa;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            border: none;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .list-tab.active {
            background: #007aff;
            color: white;
        }
        
        .list-tab:active {
            transform: scale(0.95);
        }
        
        /* Add Item */
        .add-section {
            background: #f5f7fa;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 20px;
        }
        
        .add-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .add-row input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            background: white;
        }
        
        .add-row input:focus {
            outline: none;
            border-color: #007aff;
        }
        
        .add-btn {
            background: #007aff;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }
        
        .add-btn:active {
            background: #005bbf;
            transform: scale(0.98);
        }
        
        /* Category Filter */
        .category-filter {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 8px 0 16px;
            scrollbar-width: none;
        }
        
        .category-filter::-webkit-scrollbar {
            display: none;
        }
        
        .cat-btn {
            padding: 6px 14px;
            background: #f5f7fa;
            border-radius: 16px;
            font-size: 13px;
            border: none;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .cat-btn.active {
            background: #007aff;
            color: white;
        }
        
        /* List Stats */
        .list-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
            color: #666;
        }
        
        .clear-btn {
            background: none;
            border: none;
            color: #ff3b30;
            font-size: 14px;
            padding: 4px 8px;
            cursor: pointer;
        }
        
        /* Items */
        .items-container {
            margin-bottom: 20px;
        }
        
        .item {
            background: white;
            border: 1px solid #f0f0f0;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
        }
        
        .item:active {
            background: #f9f9f9;
        }
        
        .item.completed {
            opacity: 0.6;
        }
        
        .item.completed .item-name {
            text-decoration: line-through;
            color: #999;
        }
        
        .item input[type="checkbox"] {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .item-details {
            flex: 1;
        }
        
        .item-name {
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        
        .item-meta {
            display: flex;
            gap: 8px;
            font-size: 12px;
            color: #666;
        }
        
        .item-cat {
            background: #f0f2f5;
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        .item-price {
            color: #007aff;
            font-weight: 500;
        }
        
        .item-actions {
            display: flex;
            gap: 8px;
        }
        
        .item-actions button {
            background: none;
            border: none;
            font-size: 18px;
            padding: 4px;
            cursor: pointer;
            opacity: 0.5;
            transition: 0.2s;
        }
        
        .item-actions button:hover {
            opacity: 1;
        }
        
        /* Total */
        .total {
            background: #1a1a1a;
            color: white;
            padding: 16px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 18px;
            margin-top: 8px;
        }
        
        /* Templates */
        .templates-section {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;
        }
        
        .templates-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }
        
        .templates-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        
        .template-item {
            background: #f5f7fa;
            padding: 10px 4px;
            border-radius: 12px;
            text-align: center;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .template-item:active {
            background: #e8ecf0;
            transform: scale(0.95);
        }
        
        .template-emoji {
            font-size: 20px;
            margin-bottom: 4px;
            display: block;
        }
        
        /* Nearby Store Banner */
        .store-banner {
            background: #e3f2fd;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 100;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 320px;
        }
        
        .modal-content h3 {
            margin-bottom: 16px;
            font-size: 18px;
        }
        
        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 16px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 8px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .modal-buttons .primary {
            background: #007aff;
            color: white;
        }
        
        .modal-buttons .secondary {
            background: #f0f0f0;
        }
        
        /* Notification */
        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1a1a;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            transition: 0.3s;
            z-index: 1000;
            white-space: nowrap;
            max-width: 90%;
        }
        
        .notification.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <a href="index.html" class="home-link">←</a>
            <h1>shoplist</h1>
            <button class="gps-btn" id="gpsBtn" onclick="toggleGPS()">📍</button>
        </div>
        
        <!-- Main Content -->
        <div class="content">
            <!-- Store Banner (hidden by default) -->
            <div id="storeBanner" class="store-banner" style="display: none;"></div>
            
            <!-- List Selector -->
            <div class="list-selector" id="listSelector"></div>
            
            <!-- Add Item Form -->
            <div class="add-section">
                <div class="add-row">
                    <input type="text" id="itemName" placeholder="item name">
                </div>
                <div class="add-row">
                    <input type="number" id="itemPrice" placeholder="price" step="0.01" min="0">
                    <input type="number" id="itemQty" placeholder="qty" min="1" value="1">
                </div>
                <button class="add-btn" onclick="addItem()">+ add to list</button>
            </div>
            
            <!-- Category Filter -->
            <div class="category-filter" id="categoryFilter"></div>
            
            <!-- List Stats -->
            <div class="list-stats">
                <span id="itemCount">0 items</span>
                <button class="clear-btn" onclick="clearCompleted()">clear checked</button>
            </div>
            
            <!-- Items Container -->
            <div class="items-container" id="itemsContainer"></div>
            
            <!-- Total -->
            <div class="total" id="totalDisplay">
                <span>total</span>
                <span id="totalAmount">$0.00</span>
            </div>
            
            <!-- Templates -->
            <div class="templates-section">
                <div class="templates-title">quick add</div>
                <div class="templates-grid" id="templatesGrid"></div>
            </div>
        </div>
    </div>
    
    <!-- New List Modal -->
    <div class="modal" id="newListModal">
        <div class="modal-content">
            <h3>new list</h3>
            <input type="text" id="newListName" placeholder="list name">
            <div class="modal-buttons">
                <button class="primary" onclick="createList()">create</button>
                <button class="secondary" onclick="closeModal()">cancel</button>
            </div>
        </div>
    </div>
    
    <!-- Notification -->
    <div class="notification" id="notification"></div>
    
    <script>
        // ==================== STATE ====================
        let lists = {};
        let currentListId = 'default';
        let currentCategory = 'all';
        let gpsActive = false;
        let gpsWatchId = null;
        
        const categories = [
            { id: 'all', label: 'all', icon: '📋' },
            { id: 'produce', label: 'produce', icon: '🥬' },
            { id: 'dairy', label: 'dairy', icon: '🥛' },
            { id: 'meat', label: 'meat', icon: '🥩' },
            { id: 'pantry', label: 'pantry', icon: '📦' },
            { id: 'frozen', label: 'frozen', icon: '❄️' },
            { id: 'bakery', label: 'bakery', icon: '🥖' },
            { id: 'other', label: 'other', icon: '📌' }
        ];
        
        const templates = [
            { name: 'milk', emoji: '🥛', category: 'dairy' },
            { name: 'eggs', emoji: '🥚', category: 'dairy' },
            { name: 'bread', emoji: '🍞', category: 'bakery' },
            { name: 'chicken', emoji: '🍗', category: 'meat' }
        ];
        
        // Sample stores for GPS demo
        const stores = [
            { name: 'whole foods', lat: 40.7128, lng: -74.0060 },
            { name: 'trader joes', lat: 40.7580, lng: -73.9855 },
            { name: 'walmart', lat: 40.7614, lng: -73.9776 }
        ];
        
        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', () => {
            // Load or create default list
            const saved = localStorage.getItem('shoplists');
            if (saved) {
                lists = JSON.parse(saved);
            } else {
                lists = {
                    'default': {
                        id: 'default',
                        name: 'main',
                        icon: '📋',
                        items: []
                    }
                };
            }
            
            render();
        });
        
        // ==================== RENDER ====================
        function render() {
            renderLists();
            renderCategories();
            renderItems();
            renderTemplates();
        }
        
        function renderLists() {
            const container = document.getElementById('listSelector');
            container.innerHTML = Object.values(lists).map(list => `
                <button class="list-tab ${list.id === currentListId ? 'active' : ''}" 
                        onclick="switchList('${list.id}')">
                    ${list.icon || '📋'} ${list.name}
                </button>
            `).join('');
            container.innerHTML += `<button class="list-tab" onclick="showNewListModal()">➕ new</button>`;
        }
        
        function renderCategories() {
            const container = document.getElementById('categoryFilter');
            container.innerHTML = categories.map(cat => `
                <button class="cat-btn ${cat.id === currentCategory ? 'active' : ''}" 
                        onclick="filterByCategory('${cat.id}')">
                    ${cat.icon} ${cat.label}
                </button>
            `).join('');
        }
        
        function renderItems() {
            const container = document.getElementById('itemsContainer');
            const currentList = lists[currentListId];
            
            if (!currentList) return;
            
            let items = currentList.items || [];
            
            // Filter by category
            if (currentCategory !== 'all') {
                items = items.filter(item => item.category === currentCategory);
            }
            
            if (items.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">list is empty</div>';
                updateStats();
                return;
            }
            
            // Separate active and completed
            const active = items.filter(i => !i.completed);
            const completed = items.filter(i => i.completed);
            
            container.innerHTML = [...active, ...completed].map((item, index) => {
                const originalIndex = currentList.items.findIndex(i => i.id === item.id);
                return `
                    <div class="item ${item.completed ? 'completed' : ''}">
                        <input type="checkbox" ${item.completed ? 'checked' : ''} 
                               onchange="toggleItem(${originalIndex})">
                        <div class="item-details">
                            <div class="item-name">${item.name}</div>
                            <div class="item-meta">
                                <span class="item-cat">${item.category || 'other'}</span>
                                ${item.price ? `<span class="item-price">$${item.price} × ${item.qty}</span>` : ''}
                            </div>
                        </div>
                        <div class="item-actions">
                            <button onclick="duplicateItem(${originalIndex})">📋</button>
                            <button onclick="deleteItem(${originalIndex})">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            updateStats();
            updateTotal();
        }
        
        function renderTemplates() {
            const container = document.getElementById('templatesGrid');
            container.innerHTML = templates.map(t => `
                <div class="template-item" onclick="quickAdd('${t.name}', '${t.category}')">
                    <span class="template-emoji">${t.emoji}</span>
                    ${t.name}
                </div>
            `).join('');
        }
        
        // ==================== LIST FUNCTIONS ====================
        function switchList(listId) {
            currentListId = listId;
            currentCategory = 'all';
            render();
            showNotification(`switched to ${lists[listId].name}`);
        }
        
        function showNewListModal() {
            document.getElementById('newListModal').classList.add('show');
            document.getElementById('newListName').value = '';
        }
        
        function createList() {
            const name = document.getElementById('newListName').value.trim();
            if (!name) return;
            
            const id = 'list_' + Date.now();
            lists[id] = {
                id: id,
                name: name,
                icon: '📋',
                items: []
            };
            
            saveLists();
            closeModal();
            switchList(id);
            showNotification(`created "${name}"`);
        }
        
        function closeModal() {
            document.getElementById('newListModal').classList.remove('show');
        }
        
        // ==================== ITEM FUNCTIONS ====================
        function addItem() {
            const name = document.getElementById('itemName').value.trim();
            const price = parseFloat(document.getElementById('itemPrice').value) || 0;
            const qty = parseInt(document.getElementById('itemQty').value) || 1;
            
            if (!name) {
                showNotification('enter item name');
                return;
            }
            
            const category = guessCategory(name);
            
            const item = {
                id: Date.now() + Math.random(),
                name: name,
                price: price,
                qty: qty,
                category: category,
                completed: false,
                date: new Date().toISOString()
            };
            
            lists[currentListId].items.push(item);
            saveLists();
            
            // Clear form
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '';
            document.getElementById('itemQty').value = '1';
            
            renderItems();
            showNotification(`added ${name}`);
        }
        
        function guessCategory(name) {
            name = name.toLowerCase();
            if (name.includes('milk') || name.includes('cheese') || name.includes('yogurt')) return 'dairy';
            if (name.includes('apple') || name.includes('banana') || name.includes('lettuce')) return 'produce';
            if (name.includes('chicken') || name.includes('beef') || name.includes('pork')) return 'meat';
            if (name.includes('rice') || name.includes('pasta') || name.includes('beans')) return 'pantry';
            return 'other';
        }
        
        function toggleItem(index) {
            lists[currentListId].items[index].completed = !lists[currentListId].items[index].completed;
            saveLists();
            renderItems();
        }
        
        function deleteItem(index) {
            const item = lists[currentListId].items[index];
            lists[currentListId].items.splice(index, 1);
            saveLists();
            renderItems();
            showNotification(`removed ${item.name}`);
        }
        
        function duplicateItem(index) {
            const original = lists[currentListId].items[index];
            const duplicate = {
                ...original,
                id: Date.now() + Math.random(),
                completed: false,
                date: new Date().toISOString()
            };
            lists[currentListId].items.push(duplicate);
            saveLists();
            renderItems();
            showNotification(`duplicated ${original.name}`);
        }
        
        function quickAdd(name, category) {
            const item = {
                id: Date.now() + Math.random(),
                name: name,
                price: 0,
                qty: 1,
                category: category,
                completed: false,
                date: new Date().toISOString()
            };
            
            lists[currentListId].items.push(item);
            saveLists();
            renderItems();
            showNotification(`added ${name}`);
        }
        
        function clearCompleted() {
            lists[currentListId].items = lists[currentListId].items.filter(i => !i.completed);
            saveLists();
            renderItems();
            showNotification('cleared completed');
        }
        
        function filterByCategory(category) {
            currentCategory = category;
            renderItems();
        }
        
        // ==================== UTILITY FUNCTIONS ====================
        function updateStats() {
            const items = lists[currentListId]?.items || [];
            const activeCount = items.filter(i => !i.completed).length;
            document.getElementById('itemCount').textContent = `${activeCount} item${activeCount !== 1 ? 's' : ''}`;
        }
        
        function updateTotal() {
            const items = lists[currentListId]?.items || [];
            const total = items.reduce((sum, item) => sum + (item.price * item.qty), 0);
            document.getElementById('totalAmount').textContent = `$${total.toFixed(2)}`;
        }
        
        function saveLists() {
            localStorage.setItem('shoplists', JSON.stringify(lists));
        }
        
        function showNotification(msg) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 2000);
        }
        
        // ==================== GPS ====================
        function toggleGPS() {
            const btn = document.getElementById('gpsBtn');
            
            if (!gpsActive) {
                if (!navigator.geolocation) {
                    showNotification('gps not supported');
                    return;
                }
                
                gpsWatchId = navigator.geolocation.watchPosition(
                    (pos) => {
                        btn.classList.add('active');
                        checkNearbyStores(pos.coords.latitude, pos.coords.longitude);
                    },
                    (err) => {
                        showNotification('gps error');
                        btn.classList.remove('active');
                    },
                    { enableHighAccuracy: true }
                );
                
                gpsActive = true;
                showNotification('gps active');
            } else {
                navigator.geolocation.clearWatch(gpsWatchId);
                btn.classList.remove('active');
                document.getElementById('storeBanner').style.display = 'none';
                gpsActive = false;
                showNotification('gps off');
            }
        }
        
        function checkNearbyStores(lat, lng) {
            // Simple distance check (demo)
            const store = stores[Math.floor(Math.random() * stores.length)];
            const banner = document.getElementById('storeBanner');
            
            banner.style.display = 'flex';
            banner.innerHTML = `📍 near ${store.name}`;
            
            setTimeout(() => {
                banner.style.display = 'none';
            }, 5000);
        }
        
        // Make functions global
        window.switchList = switchList;
        window.showNewListModal = showNewListModal;
        window.createList = createList;
        window.closeModal = closeModal;
        window.addItem = addItem;
        window.toggleItem = toggleItem;
        window.deleteItem = deleteItem;
        window.duplicateItem = duplicateItem;
        window.quickAdd = quickAdd;
        window.clearCompleted = clearCompleted;
        window.filterByCategory = filterByCategory;
        window.toggleGPS = toggleGPS;
    </script>
</body>
</html>
