                alert('Please login as consumer');
                window.location.href = 'login.html';
                return;
            }
            
            await loadFridgeData();
            matchRecipes();
        });
        
        async function loadFridgeData() {
            try {
                let items = await Backend.loadFridgeItems();
                if (!items || items.length === 0) {
                    items = JSON.parse(localStorage.getItem('foodItems')) || [];
                }
                fridgeItems = items;
                
                const fridgeListDiv = document.getElementById('fridgeItemsList');
                if (fridgeItems.length === 0) {
                    fridgeListDiv.innerHTML = 'No items in fridge. Add some items to get recipe recommendations!';
                } else {
                    const itemNames = fridgeItems.slice(0, 5).map(i => i.name).join(', ');
                    fridgeListDiv.innerHTML = `📦 ${fridgeItems.length} items: ${itemNames}${fridgeItems.length > 5 ? '...' : ''}`;
                }
            } catch (error) {
                console.error('Error loading fridge:', error);
                fridgeItems = [];
                document.getElementById('fridgeItemsList').innerHTML = 'Error loading fridge items';
            }
        }

            if (!ingredientInfo) {
                // Direct match fallback
                return fridgeItemName.toLowerCase().includes(ingredientKey.toLowerCase());
            }
            
            const itemLower = fridgeItemName.toLowerCase();
            return ingredientInfo.keywords.some(keyword => itemLower.includes(keyword));
        }
        
        function getAlternativeSuggestions(ingredientKey) {
            const ingredientInfo = ingredientCategories[ingredientKey];
            if (!ingredientInfo) return [];
            return ingredientInfo.keywords.filter(k => k !== ingredientKey);
        }
        
        function matchRecipes() {
            const container = document.getElementById('recipesContainer');
            const fridgeItemNames = fridgeItems.map(i => i.name.toLowerCase());
            
            const recipesWithMatch = recipeDatabase.map(recipe => {
                let requiredMatched = 0;
                let optionalMatched = 0;
                let matchedIngredients = [];
                let missingRequired = [];
                let matchedAlternatives = [];
                
                // Check required ingredients
                for (const required of recipe.requiredIngredients) {
                    let found = false;
                    let alternativeUsed = null;
                    
                    for (const fridgeItem of fridgeItemNames) {
                        if (matchesIngredient(fridgeItem, required)) {
                            found = true;
                            matchedIngredients.push(required);
                            break;
                        }
                    }
                    
                    // Check if any optional ingredient could substitute
                    if (!found) {
                        for (const optional of recipe.optionalIngredients) {
                            if (matchesIngredient(fridgeItemNames.join(' '), optional)) {
                                found = true;
                                matchedAlternatives.push(`${required} (could use ${optional})`);
                                break;
                            }
                        }
                    }
                    
                    if (found) {
                        requiredMatched++;
                    } else {
                        missingRequired.push(required);
                    }
                }
                
                // Check optional ingredients (bonus points)
                for (const optional of recipe.optionalIngredients) {
                    for (const fridgeItem of fridgeItemNames) {
                        if (matchesIngredient(fridgeItem, optional)) {
                            optionalMatched++;
                            matchedIngredients.push(optional);
                            break;
                        }
                    }
                }
                
                const totalRequired = recipe.requiredIngredients.length;
                const requiredPercentage = totalRequired > 0 ? (requiredMatched / totalRequired) * 100 : 0;
                const totalPercentage = Math.min(100, requiredPercentage + (optionalMatched * 5));
                
                return {
                    ...recipe,
                    matchPercentage: Math.round(totalPercentage),
                    requiredMatched,
                    requiredTotal: totalRequired,
                    optionalMatched,
                    missingRequired,
                    matchedIngredients,
                    matchedAlternatives
                };
            });
            
            const sortedRecipes = recipesWithMatch.sort((a, b) => b.matchPercentage - a.matchPercentage);
            const topRecipes = sortedRecipes.slice(0, 10);
            
            if (topRecipes.length === 0 || fridgeItems.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size:48px; margin-bottom:16px;">🍳</div>
                        <div>Add items to your fridge to see recipe recommendations!</div>
                        <div style="font-size:13px; margin-top:8px;">Go to Fridge tab to add items</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = topRecipes.map(recipe => {
                let matchText = '';
                let matchClass = '';
                if (recipe.matchPercentage >= 80) {
                    matchText = '🌟 Perfect match! You have almost everything!';
                    matchClass = 'high';
                } else if (recipe.matchPercentage >= 50) {
                    matchText = '👍 Good match! Just need a few items';
                    matchClass = '';
                } else if (recipe.matchPercentage >= 25) {
                    matchText = '📝 Need some ingredients, but possible';
                    matchClass = '';
                } else {
                    matchText = '🔍 Need several ingredients';
                    matchClass = '';
                }
                
                return `
                    <div class="recipe-card" onclick="openRecipeModal(${recipe.id})">
                        <div class="recipe-image">${recipe.image}</div>
                        <div class="recipe-info">
                            <div class="recipe-name">${recipe.name}</div>
                            <div class="recipe-meta">
                                <span>⏱️ ${recipe.prepTime}</span>
                                <span>🍳 ${recipe.cookTime}</span>
                                <span>🌱 ${recipe.sustainability}</span>
                            </div>
                            <div class="recipe-match ${matchClass}">${recipe.matchPercentage}% match • ${matchText}</div>
                            <div class="recipe-desc">${recipe.description}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        async function openRecipeModal(recipeId) {
            const recipe = recipeDatabase.find(r => r.id === recipeId);
            if (!recipe) return;
            
            currentRecipe = recipe;
            
            const fridgeItemNames = fridgeItems.map(i => i.name.toLowerCase());
            
            let ingredientsHtml = '';
            let missingList = [];
            let alternativesHtml = '';
            
            // Display required ingredients
            for (const required of recipe.requiredIngredients) {
                let hasIngredient = false;
                let alternativeSuggestion = '';
                
                for (const fridgeItem of fridgeItemNames) {
                    if (matchesIngredient(fridgeItem, required)) {
                        hasIngredient = true;
                        break;
                    }
                }
                
                // Check alternatives
                if (!hasIngredient) {
                    for (const optional of recipe.optionalIngredients) {
                        if (matchesIngredient(fridgeItemNames.join(' '), optional)) {
                            alternativeSuggestion = ` (could use ${optional} as alternative)`;
                            break;
                        }
                    }
                }
                
                if (hasIngredient) {
                    ingredientsHtml += `<li class="ingredient-item"><span class="ingredient-have">✅ ${required}</span> <span style="color:#34c759;">(you have this!)</span></li>`;
                } else {
                    ingredientsHtml += `<li class="ingredient-item"><span class="ingredient-missing">❌ ${required}${alternativeSuggestion}</span></li>`;
                    missingList.push(required);
                }
            }
            
            // Display optional ingredients
            if (recipe.optionalIngredients.length > 0) {
                ingredientsHtml += `<li style="list-style: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0f0;"><small style="color:#999;">✨ Optional add-ons:</small></li>`;
                for (const optional of recipe.optionalIngredients) {
                    let hasIngredient = false;
                    for (const fridgeItem of fridgeItemNames) {
                        if (matchesIngredient(fridgeItem, optional)) {
                            hasIngredient = true;
                            break;
                        }
                    }
                    if (hasIngredient) {
                        ingredientsHtml += `<li class="ingredient-item"><span>➕ ${optional}</span> <span style="color:#34c759;">(you have this!)</span></li>`;
                    } else {
                        ingredientsHtml += `<li class="ingredient-item"><span>➕ ${optional}</span> <span style="color:#999;">(optional)</span></li>`;
                    }
                }
            }
            
            let stepsHtml = '';
            recipe.steps.forEach((step, idx) => {
                stepsHtml += `
                    <li class="step-item">
                        <span class="step-number">${idx + 1}</span>
                        <span>${step}</span>
                    </li>
                `;
            });
            
            const matchPercentage = Math.min(100, Math.round((recipe.requiredMatched / recipe.requiredTotal) * 100 + (recipe.optionalMatched * 3)));
            
            const modalContent = `
                <div class="recipe-modal-header">
                    <div class="recipe-modal-name">${recipe.name}</div>
                    <div style="font-size: 12px; color: #666; margin-top: 4px;">🌱 ${recipe.sustainability}</div>
                </div>
                
                <div class="recipe-modal-section">
                    <h4>📋 Match Score: ${matchPercentage}%</h4>
                    <div style="background: #e8f5e8; border-radius: 8px; padding: 8px; margin-top: 8px;">
                        You have ${recipe.requiredMatched} of ${recipe.requiredTotal} required ingredients!
                        ${recipe.optionalMatched > 0 ? ` Plus ${recipe.optionalMatched} optional extras!` : ''}
                    </div>
                </div>
                
                <div class="recipe-modal-section">
                    <h4>🥕 Ingredients</h4>
                    <ul class="ingredient-list">${ingredientsHtml}</ul>
                </div>
                
                ${missingList.length > 0 ? `
                    <div class="recipe-modal-section">
                        <h4>🛒 Missing Items</h4>
                        <div class="missing-items-section" style="margin: 0; padding: 12px;">
                            ${missingList.map(item => `
                                <div class="missing-item">
                                    <span>${item}</span>
                                    <button class="add-to-list-btn" onclick="addToShoppingList('${item}'); event.stopPropagation();">+ Add to List</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : '<div class="recipe-modal-section"><div style="background: #e8f5e8; border-radius: 8px; padding: 12px; text-align: center;">🎉 You have all the required ingredients! Start cooking!</div></div>'}
                
                <div class="recipe-modal-section">
                    <h4>📝 Step-by-Step Instructions</h4>
                    <ul class="step-list">${stepsHtml}</ul>
                </div>
                
                <div class="recipe-modal-section">
                    <h4>🎥 Video Tutorial</h4>
                    <button class="youtube-btn" onclick="openYouTubeVideo('${recipe.youtubeSearch}')">
                        ▶️ Watch on YouTube
                    </button>
                    <div style="background: #f0f0f0; border-radius: 12px; padding: 12px; margin-top: 8px;">
                        <div style="font-size: 12px; color: #666;">💡 Tip: Search "${recipe.youtubeSearch}" on YouTube for visual guide!</div>
                    </div>
                </div>
                
                ${matchPercentage >= 50 ? `
                    <button class="mark-cooked-btn" onclick="markAsCooked()">✅ Mark as Cooked & Remove Used Items</button>
                ` : ''}
            `;
            
            document.getElementById('recipeModalContent').innerHTML = modalContent;
            document.getElementById('recipeModal').style.display = 'flex';
        }
        
        async function markAsCooked() {
            if (!currentRecipe) return;
            
            if (!confirm(`Mark "${currentRecipe.name}" as cooked? This will remove ingredients from your fridge that you used.`)) return;
            
            const usedIngredients = [];
            
            for (const required of currentRecipe.requiredIngredients) {
                for (const fridgeItem of fridgeItems) {
                    if (matchesIngredient(fridgeItem.name.toLowerCase(), required)) {
                        usedIngredients.push(fridgeItem);
                        break;
                    }
                }
            }
            
            if (usedIngredients.length > 0) {
                const removedNames = usedIngredients.map(i => i.name).join(', ');
                const newFridgeItems = fridgeItems.filter(item => !usedIngredients.includes(item));
                
                try {
                    await Backend.saveFridgeItems(newFridgeItems);
                    localStorage.setItem('foodItems', JSON.stringify(newFridgeItems));
                    fridgeItems = newFridgeItems;
                    
                    await loadFridgeData();
                    matchRecipes();
                    
                    showNotification(`✅ Removed: ${removedNames}`, 'success');
                    closeRecipeModal();
                } catch (error) {
                    alert('Error updating fridge. Please try again.');
                }
            } else {
                showNotification('No matching ingredients found in your fridge to remove.', 'error');
            }
        }
        
        function addToShoppingList(itemName) {
            let shoplist = JSON.parse(localStorage.getItem('shoplists')) || {};
            let defaultList = shoplist['default'] || { id: 'default', name: 'main', icon: '📋', items: [] };
            
            const newItem = {
                id: Date.now() + Math.random(),
                name: itemName,
                price: 0,
                qty: 1,
                category: 'other',
                completed: false,
                date: new Date().toISOString()
            };
            
            defaultList.items.push(newItem);
            shoplist['default'] = defaultList;
            localStorage.setItem('shoplists', JSON.stringify(shoplist));
            
            showNotification(`✅ Added "${itemName}" to your shopping list!`, 'success');
        }
        
        function openYouTubeVideo(searchQuery) {
            window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(searchQuery)}`, '_blank');
        }
        
        function closeRecipeModal() {
            document.getElementById('recipeModal').style.display = 'none';
            currentRecipe = null;
        }
        
        function showNotification(msg, type) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.className = `notification show ${type}`;
            setTimeout(() => notif.classList.remove('show'), 3000);
        }
        
        window.loadFridgeData = loadFridgeData;
        window.openRecipeModal = openRecipeModal;
        window.closeRecipeModal = closeRecipeModal;
        window.markAsCooked = markAsCooked;
        window.addToShoppingList = addToShoppingList;
        window.openYouTubeVideo = openYouTubeVideo;
    </script>
</body>
</html>
